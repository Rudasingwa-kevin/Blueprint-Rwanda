<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueprint Rwanda - Set New Password</title>
  <link rel="stylesheet" href="../assets/css/global-responsive.css">
  <link rel="stylesheet" href="../assets/css/ui-system.css">
  <link rel="stylesheet" href="../assets/css/auth-pages.css">
</head>
<body>
  <video autoplay loop muted playsinline class="bg-video"><source src="Visit Rwanda Soon.mp4" type="video/mp4"></video>
  <div class="anime-overlay"></div>
  <nav class="navbar">
    <a href="index.html" class="nav-logo"><img src="../assets/images/branding/blueprint-logo.png" alt="Blueprint Rwanda Logo">Blueprint Rwanda</a>
    <ul class="nav-menu"><li><a href="portfolio.html">Portfolio</a></li><li><a href="contact.html">Contact</a></li></ul>
    <div class="nav-cta"><a href="login.html">Login</a></div>
    <button class="hamburger"><span class="bar"></span><span class="bar"></span><span class="bar"></span></button>
  </nav>
  <main class="auth-main">
    <section class="auth-card">
      <img src="../assets/images/branding/blueprint-logo.png" alt="Blueprint Rwanda Logo" class="auth-logo">
      <h1 class="auth-title">Set New Password</h1>
      <p class="auth-subtitle">Enter your new password below.</p>
      <form id="resetPasswordForm" class="auth-form" onsubmit="handlePasswordReset(event)">
        <div class="form-group"><label for="password">New Password</label><input type="password" id="password" name="password" required oninput="checkPassword()"><button type="button" class="toggle-password" onclick="togglePassword('password', this)">&#128065;</button></div>
        <div class="form-group"><label for="confirmPassword">Confirm Password</label><input type="password" id="confirmPassword" name="confirmPassword" required oninput="checkPasswordMatch()"><button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">&#128065;</button></div>
        <div class="password-conditions" id="passwordConditions">
          <div class="condition-item" id="cond-length"><span class="cond-icon">?</span> At least 6 characters</div>
          <div class="condition-item" id="cond-number"><span class="cond-icon">?</span> Includes a number</div>
          <div class="condition-item" id="cond-special"><span class="cond-icon">?</span> Includes a special character</div>
          <div class="condition-item" id="cond-match"><span class="cond-icon">?</span> Passwords match</div>
        </div>
        <div id="alert" class="alert hidden"></div>
        <div id="success" class="success hidden">Password reset successfully! You can now login.</div>
        <button type="submit" class="welcome-btn" id="resetBtn">Reset Password</button>
        <p class="form-meta"><span class="form-link" onclick="window.location.href='login.html'">Back to Login</span></p>
      </form>
    </section>
  </main>
  <script src="../assets/js/api-config.js"></script>
  <script src="../assets/js/api-client.js"></script>
  <script src="../assets/js/auth-guard.js"></script>
  <script>
    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      const type = input.type === 'password' ? 'text' : 'password';
      input.type = type;
      button.innerHTML = type === 'password' ? '&#128065;' : '&#128584;';
    }
    function checkPassword() {
      const password = document.getElementById('password').value;
      const conditions = { length: password.length >= 6, number: /\d/.test(password), special: /[!@#$%^&*(),.?":{}|<>]/.test(password) };
      Object.keys(conditions).forEach(cond => {
        const element = document.getElementById('cond-' + cond);
        if (conditions[cond]) { element.classList.add('completed'); element.querySelector('.cond-icon').textContent = '?'; }
        else { element.classList.remove('completed'); element.querySelector('.cond-icon').textContent = '?'; }
      });
      checkPasswordMatch();
    }
    function checkPasswordMatch() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const matchElement = document.getElementById('cond-match');
      if (password && confirmPassword && password === confirmPassword) { matchElement.classList.add('completed'); matchElement.querySelector('.cond-icon').textContent = '?'; }
      else { matchElement.classList.remove('completed'); matchElement.querySelector('.cond-icon').textContent = '?'; }
    }
    function getUrlParameter(name) {
      name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
      const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
      const results = regex.exec(location.search);
      return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
    }
    async function handlePasswordReset(event) {
      event.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const token = getUrlParameter('token');
      const email = getUrlParameter('email');
      const alertDiv = document.getElementById('alert');
      const successDiv = document.getElementById('success');
      const resetBtn = document.getElementById('resetBtn');
      if (password !== confirmPassword) { alertDiv.textContent = 'Passwords do not match.'; alertDiv.classList.remove('hidden'); successDiv.classList.add('hidden'); return; }
      if (!token || !email) { alertDiv.textContent = 'Invalid reset link. Please request a new password reset.'; alertDiv.classList.remove('hidden'); successDiv.classList.add('hidden'); return; }
      alertDiv.classList.add('hidden'); successDiv.classList.add('hidden');
      resetBtn.disabled = true; resetBtn.textContent = 'Resetting...';
      try {
        await window.BP_API.post('/auth/reset-password', { token, email, password, password_confirmation: confirmPassword });
        successDiv.classList.remove('hidden');
        document.getElementById('resetPasswordForm').reset();
        setTimeout(() => { window.location.href = 'login.html'; }, 3000);
      } catch (error) {
        alertDiv.textContent = error.message || 'Password reset failed. Please try again.';
        alertDiv.classList.remove('hidden');
      } finally {
        resetBtn.disabled = false; resetBtn.textContent = 'Reset Password';
      }
    }
    window.onload = function() {
      const token = getUrlParameter('token');
      const email = getUrlParameter('email');
      if (!token || !email) {
        document.getElementById('alert').textContent = 'Invalid reset link. Please request a new password reset.';
        document.getElementById('alert').classList.remove('hidden');
        document.getElementById('resetPasswordForm').style.display = 'none';
      }
    };
  </script>
  <script src="../assets/js/navbar.js"></script>
</body>
</html>
