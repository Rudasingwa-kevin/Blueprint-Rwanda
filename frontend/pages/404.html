<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Blueprint Rwanda</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .error-main {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--bg);
        }

        .error-content {
            max-width: 600px;
            padding: 2rem;
        }

        .error-icon {
            font-size: 6rem;
            color: var(--primary);
            margin-bottom: 2rem;
            opacity: 0.5;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 1rem;
            letter-spacing: -5px;
        }

        .error-actions {
            margin-top: 3rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
    </style>
</head>
<body>
    <main class="error-main">
        <div class="error-content" data-animate>
            <div class="error-icon"><i class="fas fa-mountain"></i></div>
            <div class="error-code">404</div>
            <h1 style="margin-bottom: 1rem;">Lost in the Hills?</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">The page you're looking for has wandered off into the Rwandan mist. Let's get you back on track.</p>
            
            <div class="error-actions">
                <button class="btn btn-primary" onclick="location.href='index.html'">Return Home</button>
                <button class="btn btn-secondary" onclick="history.back()">Go Back</button>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
</body>
</html>
