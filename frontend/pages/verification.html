<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Authorization - Blueprint Rwanda</title>
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .auth-main {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: var(--space-md);
        }

        .verify-card {
            width: 100%;
            max-width: 480px;
            padding: 3rem;
            text-align: center;
            position: relative;
        }

        .otp-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2.5rem 0;
        }

        .otp-input {
            width: 50px;
            height: 60px;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--white);
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--primary);
            transition: var(--transition);
        }

        .otp-input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: var(--shadow-sm);
        }

        .timer {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
        }
    </style>
</head>
<body data-no-navbar data-no-footer>
    <main class="auth-main">
        <div class="card verify-card glass" data-animate>
            <div style="margin-bottom: 2rem;">
                <div class="icon-circle flex-center" style="width: 80px; height: 80px; background: var(--gradient-gold); color: var(--white); margin: 0 auto 1.5rem; font-size: 2rem; border-radius: 50%;">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1 class="gradient-text">Authorize Identity</h1>
                <p style="color: var(--text-muted);">We've sent a 4-digit security code to your registered device.</p>
            </div>

            <div class="otp-container">
                <input type="text" maxlength="1" class="otp-input" value="4">
                <input type="text" maxlength="1" class="otp-input" placeholder="·">
                <input type="text" maxlength="1" class="otp-input" placeholder="·">
                <input type="text" maxlength="1" class="otp-input" placeholder="·">
            </div>

            <div class="timer">RESEND CODE IN <span id="time">59s</span></div>

            <button class="btn btn-primary w-100" style="width: 100%;" onclick="location.href='dashboard.html'">Finalize Authorization</button>
            
            <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
                Didn't receive the code? <a href="#" style="color: var(--primary); font-weight: 700;">Request Recall</a>
            </p>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        // Simple timer logic
        let timeLeft = 59;
        const timerEl = document.getElementById('time');
        const timerInterval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerEl.innerText = "NOW";
            } else {
                timerEl.innerText = `${timeLeft}s`;
                timeLeft--;
            }
        }, 1000);

        // Auto focus next input
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
        });
    </script>
</body>
</html>
