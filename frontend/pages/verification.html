<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Blueprint Rwanda</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        body {
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 1rem;
            z-index: 10;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header img {
            width: 80px;
            margin-bottom: 1.5rem;
        }

        .auth-tabs {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .auth-tab {
            padding: 0.75rem 0.5rem;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: var(--transition);
        }

        .auth-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--white);
            transition: var(--transition);
        }

        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(160, 82, 45, 0.1);
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .role-option {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .role-option i {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            display: block;
            color: var(--text-muted);
        }

        .role-option.active {
            border-color: var(--primary);
            background: var(--surface);
        }

        .role-option.active i {
            color: var(--primary);
        }

        .hidden { display: none; }

        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
        }
    </style>
</head>
<body data-no-navbar data-no-footer>
    <div class="auth-container">
        <div class="auth-card" data-animate>
            <div class="auth-header">
                <img src="../assets/images/branding/blueprint-logo.png" alt="Blueprint Rwanda">
                <h2>Welcome Back</h2>
                <p style="color: var(--text-muted);">Invest in Rwanda's future today.</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" id="loginTabBtn">Login</div>
                <div class="auth-tab" id="signupTabBtn">Sign Up</div>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <div style="text-align: right; margin-bottom: 1.5rem;">
                    <a href="#" style="font-size: 0.85rem; color: var(--primary);">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="padding: 1rem;">Login to Dashboard</button>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="hidden">
                <div class="form-group">
                    <label>I want to be a:</label>
                    <div class="role-selector">
                        <div class="role-option active" data-role="explorer">
                            <i class="fas fa-compass"></i>
                            <div>Explorer</div>
                        </div>
                        <div class="role-option" data-role="owner">
                            <i class="fas fa-home"></i>
                            <div>Partner</div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="padding: 1rem;">Create Account</button>
            </form>

            <div class="auth-footer">
                <p id="authSwitchText">Don't have an account? <a href="#" id="switchBtn">Sign up</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        const loginTabBtn = document.getElementById('loginTabBtn');
        const signupTabBtn = document.getElementById('signupTabBtn');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const switchBtn = document.getElementById('switchBtn');
        const authSwitchText = document.getElementById('authSwitchText');

        function showLogin() {
            loginTabBtn.classList.add('active');
            signupTabBtn.classList.remove('active');
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            authSwitchText.innerHTML = `Don't have an account? <a href="#" onclick="showSignup()">Sign up</a>`;
        }

        function showSignup() {
            signupTabBtn.classList.add('active');
            loginTabBtn.classList.remove('active');
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            authSwitchText.innerHTML = `Already have an account? <a href="#" onclick="showLogin()">Login</a>`;
        }

        loginTabBtn.onclick = showLogin;
        signupTabBtn.onclick = showSignup;
        switchBtn.onclick = (e) => { e.preventDefault(); showSignup(); };

        // Role Selector logic
        const roleOptions = document.querySelectorAll('.role-option');
        roleOptions.forEach(opt => {
            opt.onclick = () => {
                roleOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
            };
        });

        // Form Submit
        loginForm.onsubmit = e => {
            e.preventDefault();
            window.location.href = 'admin-dashboard.html';
        };

        signupForm.onsubmit = e => {
            e.preventDefault();
            const role = document.querySelector('.role-option.active').dataset.role;
            if (role === 'owner') {
                window.location.href = 'user-dashboard.html';
            } else {
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
