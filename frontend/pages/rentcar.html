<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent a Car - Blueprint Rwanda</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/blueprint-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/listings.css">
</head>
<body>
    <header class="listing-hero" style="background-image: url('../assets/images/ui/car.png');">
        <div class="container" data-animate>
            <h1>Explore Rwanda at Your Own Pace</h1>
            <p>Premium car rentals for city drives and mountain adventures.</p>
        </div>
    </header>

    <section class="search-section">
        <div class="container">
            <div class="search-box glass" style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <div style="flex: 1; display: flex; align-items: center; gap: 0.5rem; min-width: 250px;">
                    <i class="fas fa-car" style="color: var(--primary);"></i>
                    <input type="text" placeholder="Search for SUV, Sedan, or Luxury vehicles..." style="width: 100%;">
                </div>
                <button class="btn btn-primary" style="flex-shrink: 0;">Search</button>
            </div>
        </div>
    </section>

    <main class="listing-section container">
        <div class="listing-header" data-animate>
            <div>
                <p style="color: var(--primary); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">Reliable Fleet</p>
                <h2>Available Vehicles</h2>
            </div>
        </div>

        <div class="listing-grid">
            <!-- Car 1 -->
            <div class="listing-card" data-animate>
                <div class="card-image">
                    <img src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?auto=format&fit=crop&q=80&w=800" alt="Toyota Land Cruiser">
                    <span class="card-type">SUV / 4x4</span>
                </div>
                <div class="card-content">
                    <div class="card-meta">
                        <span class="rating"><i class="fas fa-star"></i> 4.98</span>
                        <span style="font-size: 0.8rem; color: var(--text-muted);">(45 reviews)</span>
                    </div>
                    <h3 class="card-title">Toyota Land Cruiser V8</h3>
                    <p class="card-location"><i class="fas fa-gas-pump"></i> Diesel • Automatic</p>
                    <div class="card-footer">
                        <div class="price">$150<span> / day</span></div>
                        <button class="btn btn-secondary btn-sm" style="padding: 0.5rem 1rem;">Rent now</button>
                    </div>
                </div>
            </div>

            <!-- Car 2 -->
            <div class="listing-card" data-animate style="transition-delay: 0.1s;">
                <div class="card-image">
                    <img src="https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?auto=format&fit=crop&q=80&w=800" alt="Toyota RAV4">
                    <span class="card-type">Compact SUV</span>
                </div>
                <div class="card-content">
                    <div class="card-meta">
                        <span class="rating"><i class="fas fa-star"></i> 4.90</span>
                        <span style="font-size: 0.8rem; color: var(--text-muted);">(32 reviews)</span>
                    </div>
                    <h3 class="card-title">Toyota RAV4</h3>
                    <p class="card-location"><i class="fas fa-gas-pump"></i> Petrol • Automatic</p>
                    <div class="card-footer">
                        <div class="price">$70<span> / day</span></div>
                        <button class="btn btn-secondary btn-sm" style="padding: 0.5rem 1rem;">Rent now</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
</body>
</html>
