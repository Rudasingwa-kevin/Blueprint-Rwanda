<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credential Issuance - Blueprint Rwanda</title>
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
    <main class="admin-main container">
        <header class="admin-header" data-animate>
            <div class="admin-title">
                <h1 class="gradient-text">Credential Issuance</h1>
                <p>Registering a new delegate into the premium Rwandan ecosystem.</p>
            </div>
            <div class="admin-actions">
                <button class="btn btn-secondary" onclick="history.back()">Discard Changes</button>
            </div>
        </header>

        <section class="admin-form-container">
            <div class="card glass" style="padding: 3rem;" data-animate style="transition-delay: 0.1s;">
                <form id="userForm" class="form-grid">
                    <!-- Delegate Identity -->
                    <div class="form-group">
                        <label>Given Name</label>
                        <input type="text" class="form-control" placeholder="John" required>
                    </div>

                    <div class="form-group">
                        <label>Family Name</label>
                        <input type="text" class="form-control" placeholder="Doe" required>
                    </div>

                    <div class="form-group full">
                        <label>Communication Hash (Email)</label>
                        <input type="email" class="form-control" placeholder="stakeholder@blueprint.rw" required>
                    </div>

                    <!-- Authorization Protocols -->
                    <div class="form-group">
                        <label>Authorization Class</label>
                        <select class="form-control">
                            <option>Standard Delegate</option>
                            <option>Elite Partner</option>
                            <option>Platform Moderator</option>
                            <option>Supreme Admin</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Administrative Sector</label>
                        <input type="text" class="form-control" placeholder="Hospitality, Mobility, or Core">
                    </div>

                    <div class="form-group full">
                        <label>Initial Security Key</label>
                        <input type="password" class="form-control" placeholder="Minimum 16 characters for high-level credentials" required>
                    </div>

                    <div class="form-group full" style="display: flex; align-items: center; gap: 1rem; margin-top: 1rem;">
                        <input type="checkbox" style="width: 20px; height: 20px; cursor: pointer;">
                        <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: 600;">Issue instantaneous activation link via secure channel.</span>
                    </div>

                    <div style="grid-column: span 2; display: flex; justify-content: flex-end; gap: 1.5rem; margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary" style="padding-left: 4rem; padding-right: 4rem;">Authorize Issuance</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        document.getElementById('userForm').onsubmit = function(e) {
            e.preventDefault();
            Components.showToast('Delegate Credentials Synchronized', 'success');
            setTimeout(() => {
                location.href = 'admin-stakeholders.html';
            }, 1500);
        };
    </script>
</body>
</html>
