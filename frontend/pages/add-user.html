<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User - Admin</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .form-main {
            padding-top: 100px;
            padding-bottom: var(--space-lg);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-header {
            margin-bottom: var(--space-md);
        }

        .form-header h1 {
            font-size: 2rem;
            color: var(--primary);
        }

        .form-card {
            padding: var(--space-md);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--white);
            font-family: inherit;
        }

        .avatar-upload {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--bg);
            border-radius: var(--radius-md);
        }

        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--text-muted);
            overflow: hidden;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <main class="form-main container">
        <header class="form-header" data-animate>
            <h1>Create New User</h1>
            <p>Add a new member to the community or administrative team.</p>
        </header>

        <section class="card form-card" data-animate style="transition-delay: 0.1s;">
            <form id="userForm">
                <div class="avatar-upload">
                    <div class="avatar-preview" id="avatarPreview">
                        <i class="fas fa-user"></i>
                    </div>
                    <div>
                        <label for="avatar" style="cursor: pointer; color: var(--primary); font-weight: 700;">
                            <i class="fas fa-camera"></i> Upload Photo
                        </label>
                        <input type="file" id="avatar" style="display: none;" accept="image/*">
                        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem;">JPG or PNG. Max 2MB.</p>
                    </div>
                </div>

                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="e.g. Samuel Niyonkuru" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="samuel@example.com" required>
                </div>

                <div class="form-group">
                    <label for="role">User Role</label>
                    <select id="role">
                        <option value="user">Regular User</option>
                        <option value="moderator">Moderator</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="password">Initial Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="history.back()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Account</button>
                </div>
            </form>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        document.getElementById('userForm').onsubmit = function(e) {
            e.preventDefault();
            alert('User account created successfully!');
            location.href = 'admin-users.html';
        };

        // Simple avatar preview
        document.getElementById('avatar').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('avatarPreview').innerHTML = `<img src="${event.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                };
                reader.readAsDataURL(file);
            }
        };
    </script>
</body>
</html>
