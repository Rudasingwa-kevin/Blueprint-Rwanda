<body>
  <div class="review-container">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:0.8rem;">
      <button id="backBtn" class="welcome-btn" style="padding:0.5rem 1rem;background:#7c3f17;">← Back</button>
      <div style="flex:1"></div>
    </div>
    <div class="review-title">Submit Your Review</div>
    <div id="itemContext" style="display:none;margin:-0.6rem 0 1.2rem 0;color:#7c3f17;font-weight:700;text-align:center;"></div>
    <div class="overall-box" id="overallBox" style="display:none;">
      <span id="overallLabel">Overall average (out of 5)</span>
      <div class="overall-right">
        <span class="stars" id="overallStars">☆☆☆☆☆</span>
        <span id="overallAvg">-</span>
        <span id="overallCount" style="font-weight:600; color:#7c3f17;"></span>
      </div>
    </div>
    <form class="review-form">
      <label for="reviewName">Your Name</label>
      <input type="text" id="reviewName" name="reviewName" required>
      <label>Rate by category</label>
      <div class="ratings-grid">
        <div>
          <label for="rateSecurity">Security</label>
          <select id="rateSecurity" required>
            <option value="">Select</option>
            <option value="5">5 - Excellent</option>
            <option value="4">4 - Good</option>
            <option value="3">3 - Average</option>
            <option value="2">2 - Poor</option>
            <option value="1">1 - Terrible</option>
          </select>
        </div>
        <div>
          <label for="rateCleanliness">Cleanliness</label>
          <select id="rateCleanliness" required>
            <option value="">Select</option>
            <option value="5">5 - Excellent</option>
            <option value="4">4 - Good</option>
            <option value="3">3 - Average</option>
            <option value="2">2 - Poor</option>
            <option value="1">1 - Terrible</option>
          </select>
        </div>
        <div>
          <label for="rateComfort">Comfort</label>
          <select id="rateComfort" required>
            <option value="">Select</option>
            <option value="5">5 - Excellent</option>
            <option value="4">4 - Good</option>
            <option value="3">3 - Average</option>
            <option value="2">2 - Poor</option>
            <option value="1">1 - Terrible</option>
          </select>
        </div>
        <div>
          <label for="rateLocation">Location</label>
          <select id="rateLocation" required>
            <option value="">Select</option>
            <option value="5">5 - Excellent</option>
            <option value="4">4 - Good</option>
            <option value="3">3 - Average</option>
            <option value="2">2 - Poor</option>
            <option value="1">1 - Terrible</option>
          </select>
        </div>
        <div>
          <label for="rateValue">Value</label>
          <select id="rateValue" required>
            <option value="">Select</option>
            <option value="5">5 - Excellent</option>
            <option value="4">4 - Good</option>
            <option value="3">3 - Average</option>
            <option value="2">2 - Poor</option>
            <option value="1">1 - Terrible</option>
          </select>
        </div>
      </div>
      <div class="avg-display">
        <span>Average rating</span>
        <span id="avgValue">-</span>
      </div>
      <label for="reviewText">Review</label>
      <textarea id="reviewText" name="reviewText" rows="5" required></textarea>
      <button type="submit">Submit Review</button>
      <div class="success-msg" id="successMsg">Thanks! Your review has been submitted.</div>
    </form>
  </div>
  <script>
    (function() {
      const selects = ['rateSecurity','rateCleanliness','rateComfort','rateLocation','rateValue'].map(id => document.getElementById(id));
      const avgSpan = document.getElementById('avgValue');
      const form = document.querySelector('.review-form');
      const successMsg = document.getElementById('successMsg');
      const overallBox = document.getElementById('overallBox');
      const overallAvg = document.getElementById('overallAvg');
      const overallStars = document.getElementById('overallStars');
      const overallCount = document.getElementById('overallCount');
      const currentItemName = localStorage.getItem('itemName');
      const currentItemType = localStorage.getItem('itemType');
      const currentItemId = localStorage.getItem('itemId');
      const itemContext = document.getElementById('itemContext');
      const backBtn = document.getElementById('backBtn');

      if (currentItemName && currentItemType) {
        itemContext.style.display = '';
        itemContext.textContent = `${currentItemType[0].toUpperCase()+currentItemType.slice(1)}: ${currentItemName}`;
      }

      backBtn.onclick = function() {
        const from = localStorage.getItem('fromPage');
        if (from) {
          window.location.href = from;
        } else {
          history.back();
        }
      };

      function makeStars(ratingOutOfFive) {
        const n = Math.round(ratingOutOfFive);
        let s = '';
        for (let i = 0; i < 5; i++) s += i < n ? '★' : '☆';
        return s;
      }

      function updateOverallBox() {
        try {
          const all = JSON.parse(localStorage.getItem('bp_reviews') || '[]');
          const filtered = (currentItemName && currentItemType) ? all.filter(r => (
            (currentItemId ? r.itemId === currentItemId : r.itemName === currentItemName) && r.itemType === currentItemType
          )) : all;
          if (!filtered.length) {
            overallBox.style.display = 'none';
            return;
          }
          const avg = filtered.reduce((a, r) => a + (typeof r.average === 'number' ? r.average : 0), 0) / filtered.length;
          overallAvg.textContent = avg.toFixed(2) + ' / 5';
          overallStars.textContent = makeStars(avg);
          overallCount.textContent = `(${filtered.length})`;
          overallBox.style.display = '';
        } catch (_) {
          overallBox.style.display = 'none';
        }
      }

      function calcAverage() {
        const values = selects.map(s => parseFloat(s.value)).filter(v => !isNaN(v));
        if (values.length === selects.length) {
          const avg = values.reduce((a,b)=>a+b,0) / values.length;
          avgSpan.textContent = avg.toFixed(2) + ' / 5';
          return avg;
        } else {
          avgSpan.textContent = '-';
          return null;
        }
      }
      selects.forEach(s => s.addEventListener('change', calcAverage));
      calcAverage();

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        const avg = calcAverage();
        if (avg === null) {
          alert('Please rate all categories.');
          return;
        }

        function generateId() {
          return 'rev-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8);
        }

        const review = {
          id: generateId(),
          name: document.getElementById('reviewName').value.trim(),
          text: document.getElementById('reviewText').value.trim(),
          ratings: {
            security: parseInt(document.getElementById('rateSecurity').value, 10),
            cleanliness: parseInt(document.getElementById('rateCleanliness').value, 10),
            comfort: parseInt(document.getElementById('rateComfort').value, 10),
            location: parseInt(document.getElementById('rateLocation').value, 10),
            value: parseInt(document.getElementById('rateValue').value, 10)
          },
          average: parseFloat(avg.toFixed(2)),
          itemId: localStorage.getItem('itemId') || null,
          itemName: localStorage.getItem('itemName') || null,
          itemType: localStorage.getItem('itemType') || null,
          createdAt: new Date().toISOString()
        };

        try {
          const key = 'bp_reviews';
          const existing = JSON.parse(localStorage.getItem(key) || '[]');
          existing.push(review);
          localStorage.setItem(key, JSON.stringify(existing));
          successMsg.style.display = 'block';
          form.querySelector('button[type="submit"]').disabled = true;
          updateOverallBox();
        } catch (err) {
          console.error(err);
          alert('Could not save your review locally.');
        }
      });
      updateOverallBox();
    })();
  </script>
  <script src="../assets/js/navbar.js"></script>
