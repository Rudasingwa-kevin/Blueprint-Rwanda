<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Review - Blueprint Rwanda</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .review-main {
            padding-top: 120px;
            padding-bottom: var(--space-lg);
            max-width: 600px;
            margin: 0 auto;
        }

        .review-header {
            text-align: center;
            margin-bottom: var(--space-md);
        }

        .rating-stars {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 1.5rem 0;
            font-size: 2rem;
            color: var(--border);
        }

        .rating-stars i {
            cursor: pointer;
            transition: var(--transition);
        }

        .rating-stars i.active {
            color: #f6ad55;
        }

        .review-form-card {
            padding: var(--space-md);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }
    </style>
</head>
<body>
    <main class="review-main container">
        <header class="review-header" data-animate>
            <h1>Share Your Experience</h1>
            <p>Your feedback helps the community and our partners improve.</p>
        </header>

        <section class="card review-form-card" data-animate style="transition-delay: 0.1s;">
            <form id="reviewForm">
                <div class="form-group" style="text-align: center;">
                    <label>Overall Rating</label>
                    <div class="rating-stars" id="stars">
                        <i class="fas fa-star" data-value="1"></i>
                        <i class="fas fa-star" data-value="2"></i>
                        <i class="fas fa-star" data-value="3"></i>
                        <i class="fas fa-star" data-value="4"></i>
                        <i class="fas fa-star" data-value="5"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reviewTitle">Review Title</label>
                    <input type="text" id="reviewTitle" placeholder="e.g. Amazing Stay!" required>
                </div>

                <div class="form-group">
                    <label for="reviewContent">Detailed Feedback</label>
                    <textarea id="reviewContent" placeholder="Tell us about the service, facilities, and your overall experience..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Add Photos (Optional)</label>
                    <div style="border: 2px dashed var(--border); padding: 2rem; text-align: center; border-radius: var(--radius-md); cursor: pointer;">
                        <i class="fas fa-camera" style="font-size: 1.5rem; color: var(--primary); margin-bottom: 0.5rem;"></i>
                        <p style="font-size: 0.8rem; color: var(--text-muted);">Click to upload experience photos</p>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Submit Review</button>
            </form>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        const stars = document.querySelectorAll('#stars i');
        let selectedRating = 0;

        stars.forEach(star => {
            star.addEventListener('mouseover', function() {
                resetStars();
                highlightStars(this.dataset.value);
            });

            star.addEventListener('click', function() {
                selectedRating = this.dataset.value;
                highlightStars(selectedRating);
            });
        });

        document.getElementById('stars').addEventListener('mouseleave', function() {
            resetStars();
            if (selectedRating > 0) highlightStars(selectedRating);
        });

        function highlightStars(val) {
            stars.forEach(s => {
                if (s.dataset.value <= val) s.classList.add('active');
            });
        }

        function resetStars() {
            stars.forEach(s => s.classList.remove('active'));
        }

        document.getElementById('reviewForm').onsubmit = function(e) {
            e.preventDefault();
            if (selectedRating === 0) {
                alert('Please provide a rating.');
                return;
            }
            alert('Thank you for your review!');
            history.back();
        };
    </script>
</body>
</html>
