<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Blueprint Rwanda</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .auth-main {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg) 0%, var(--surface) 100%);
            padding: var(--space-md);
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: var(--space-md);
            text-align: center;
        }

        .auth-logo {
            margin-bottom: var(--space-md);
        }

        .auth-title {
            margin-bottom: var(--space-sm);
            color: var(--primary);
        }

        .auth-form {
            text-align: left;
            margin-top: var(--space-md);
        }

        .form-group {
            margin-bottom: var(--space-sm);
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--white);
            transition: var(--transition);
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(160, 82, 45, 0.1);
        }

        .auth-footer {
            margin-top: var(--space-md);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="auth-main">
        <div class="card auth-card glass" data-animate>
            <div class="auth-logo">
                <a href="index.html" style="display: inline-flex; align-items: center; gap: 0.5rem; font-family: var(--font-heading); font-weight: 700; color: var(--primary); font-size: 1.5rem;">
                    <i class="fas fa-landmark"></i>
                    Blueprint Rwanda
                </a>
            </div>
            
            <h1 class="auth-title">Welcome Back</h1>
            <p>Enter your details to access your account.</p>

            <form class="auth-form" action="dashboard.html">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-md); font-size: 0.85rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" style="width: auto;"> Remember me
                    </label>
                    <a href="password-reset-request.html" style="color: var(--primary); font-weight: 600;">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100" style="width: 100%;">Sign In</button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="signup.html">Create an Account</a>
            </p>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
</body>
</html>
