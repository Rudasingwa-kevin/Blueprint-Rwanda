<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueprint Rwanda - Login</title>
  <link rel="stylesheet" href="../assets/css/global-responsive.css">
  <link rel="stylesheet" href="../assets/css/ui-system.css">
  <link rel="stylesheet" href="../assets/css/auth-pages.css">
</head>
<body>
  <video autoplay loop muted playsinline class="bg-video"><source src="Visit Rwanda Soon.mp4" type="video/mp4"></video>
  <div class="anime-overlay"></div>

  <nav class="navbar">
    <a href="index.html" class="nav-logo"><img src="../assets/images/branding/blueprint-logo.png" alt="Blueprint Rwanda Logo">Blueprint Rwanda</a>
    <ul class="nav-menu">
      <li><a href="all-services.html">Services</a></li>
      <li><a href="owners.html">Owners</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-cta"><a href="signup.html">Sign Up</a></div>
    <button class="hamburger"><span class="bar"></span><span class="bar"></span><span class="bar"></span></button>
  </nav>

  <main class="auth-main">
    <section class="auth-card">
      <img src="../assets/images/branding/blueprint-logo.png" alt="Blueprint Rwanda Logo" class="auth-logo">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your account</p>
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" required></div>
        <div class="form-group"><label for="password">Password</label><input type="password" id="password" name="password" required><button type="button" class="toggle-password" onclick="togglePassword('password', this)">&#128065;</button></div>
        <div id="alert" class="alert hidden"></div>
        <button type="submit" class="welcome-btn" id="loginBtn">Login</button>
        <p class="form-meta"><span class="form-link" onclick="window.location.href='password-reset-request.html'">Forgot password?</span></p>
        <p class="form-meta">Don't have an account? <span class="form-link" onclick="window.location.href='signup.html'">Sign up</span></p>
      </form>
    </section>
  </main>

  <script src="../assets/js/api-config.js"></script>
  <script src="../assets/js/api-client.js"></script>
  <script src="../assets/js/auth-guard.js"></script>
  <script>
    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      const type = input.type === 'password' ? 'text' : 'password';
      input.type = type;
      button.innerHTML = type === 'password' ? '&#128065;' : '&#128584;';
    }

    async function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const alertDiv = document.getElementById('alert');
      const loginBtn = document.getElementById('loginBtn');
      alertDiv.classList.add('hidden');
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';

      try {
        const response = await window.BP_API.post('/auth/login', { email, password });
        localStorage.setItem(window.BP_CONFIG.FRONTEND_USER_STORAGE_KEY, JSON.stringify(response.user));
        localStorage.setItem(window.BP_CONFIG.FRONTEND_ROLE_STORAGE_KEY, response.user.role);
        if (response.user.role === 'admin') window.location.href = 'admin-dashboard.html';
        else if (response.user.role === 'owner') window.location.href = 'user-dashboard.html';
        else window.location.href = 'dashboard.html';
      } catch (error) {
        alertDiv.textContent = error.message || 'Login failed. Please try again.';
        alertDiv.classList.remove('hidden');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    }
  </script>
  <script src="../assets/js/navbar.js"></script>
</body>
</html>
