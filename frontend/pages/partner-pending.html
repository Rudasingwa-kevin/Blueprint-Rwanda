<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Pending - Blueprint Rwanda</title>
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .pending-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-md);
            text-align: center;
            background: var(--bg);
        }

        .pending-card {
            max-width: 600px;
            padding: 4rem;
            position: relative;
            overflow: hidden;
        }

        .pending-icon {
            width: 100px;
            height: 100px;
            background: var(--primary);
            color: var(--secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 2.5rem;
            position: relative;
        }

        .pending-icon::after {
            content: '';
            position: absolute;
            width: 120%;
            height: 120%;
            border: 2px dashed var(--primary);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(160, 82, 45, 0.1);
            color: var(--primary);
            border-radius: var(--radius-pill);
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        .contact-support {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body data-no-navbar data-no-footer>
    <main class="pending-section">
        <div class="card glass pending-card" data-animate>
            <div class="pending-icon">
                <i class="fas fa-shield-check"></i>
            </div>
            
            <div class="status-badge">Verification in Progress</div>
            
            <h1 class="gradient-text" style="font-size: 2.5rem; margin-bottom: 1.5rem;">Awaiting Conformation</h1>
            
            <p style="font-size: 1.1rem; color: var(--text-muted); line-height: 1.8; margin-bottom: 2.5rem;">
                Your business application has been submitted to our executive board. We are currently verifying your credentials and RDB documentation to ensure ecosystem integrity.
            </p>

            <div style="display: flex; gap: 1rem; justify-content: center;">
                <a href="index.html" class="btn btn-secondary">Return to Home</a>
                <a href="faq.html" class="btn btn-primary" style="background: var(--primary); color: var(--secondary);">Review Protocols</a>
            </div>

            <div class="contact-support">
                Need immediate assistance? <a href="contact.html" style="color: var(--primary); font-weight: 700;">Contact Verifications</a>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
</body>
</html>
