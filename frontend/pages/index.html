<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueprint Rwanda - Welcome</title>
  <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <style>
  /* General Body Styles */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f5e9da; /* beige */
    color: #4e2e0e; /* chocolate */
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Glassmorphism Form for Welcome Page */
  .glass-form {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.4);
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    min-width: 320px;
    max-width: 90vw;
    z-index: 3;
    text-align: center;
  }

  .logo {
    width: 180px;
    margin-bottom: 0.5rem;
  }

  .glass-form h1 {
    color: #a0522d;
    margin-bottom: 0.5rem;
    font-size: 2.2rem;
    letter-spacing: 1px;
  }

  .subtitle {
    font-size: 1.1rem;
    margin-bottom: 1rem;
    color: #4e2e0e;
  }

  .services {
    list-style: none;
    padding: 0;
    margin: 0 0 1.5rem 0;
  }

  .services li {
    font-size: 1.1rem;
    margin: 0.3rem 0;
    color: #a0522d;
    font-weight: 500;
  }

  .welcome-btn {
    background: #a0522d;
    color: #fff8e7;
    border: none;
    border-radius: 20px;
    padding: 0.8rem 2.2rem;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(160, 82, 45, 0.15);
    transition: background 0.2s;
  }

  .welcome-btn:hover {
    background: #7c3f17;
  }

  @media (max-width: 600px) {
    .glass-form {
      padding: 1.2rem 0.5rem;
      min-width: 0;
    }
    .logo {
      width: 110px;
    }
    .glass-form h1 {
      font-size: 1.3rem;
    }
  }

  .navbar {
    position: sticky;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(160, 82, 45, 0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    z-index: 1000;
    height: 70px;
    box-shadow: 0 4px 20px rgba(160, 82, 45, 0.15);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    font-size: 1.4rem;
    font-weight: bold;
    color: #fff8e7;
    cursor: pointer;
    text-decoration: none;
  }

  .nav-logo img {
    width: 60px;
    height: 60px;
    object-fit: contain;
    transition: transform 0.3s ease;
  }

  .nav-logo:hover img {
    transform: scale(1.1);
  }

  .nav-menu {
    list-style: none;
    display: flex;
    gap: 2rem;
    margin: 0;
    padding: 0;
    align-items: center;
  }

  .nav-menu li a {
    color: #fff8e7;
    text-decoration: none;
    font-size: 1.1rem;
    font-weight: 500;
    transition: color 0.3s ease;
    position: relative;
    padding: 5px 0;
  }

  .nav-menu li a:hover {
    color: #ffe4b5;
  }

  .nav-menu li a::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 2px;
    bottom: 0;
    left: 0;
    background-color: #ffe4b5;
    transform: scaleX(0);
    transform-origin: bottom right;
    transition: transform 0.25s ease-out;
  }

  .nav-menu li a:hover::after {
    transform: scaleX(1);
    transform-origin: bottom left;
  }

  .nav-cta a {
    background-color: #fff8e7;
    color: #a0522d;
    padding: 0.5rem 1.5rem;
    border-radius: 20px;
    font-weight: bold;
    text-decoration: none;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  .nav-cta a:hover {
    background-color: #ffe4b5;
    color: #7c3f17;
  }

  .hamburger {
    display: none;
    cursor: pointer;
    background: transparent;
    border: none;
    padding: 0;
    z-index: 1001;
  }

  .bar {
    display: block;
    width: 25px;
    height: 3px;
    margin: 5px auto;
    background-color: #fff8e7;
    transition: all 0.3s ease-in-out;
  }

  @media (max-width: 850px) {
    .nav-menu {
      position: fixed;
      left: -100%;
      top: 0;
      flex-direction: column;
      background-color: rgba(160, 82, 45, 0.98);
      width: 100%;
      height: 100vh;
      text-align: center;
      transition: 0.3s;
      box-shadow: 0 10px 27px rgba(0, 0, 0, 0.05);
      justify-content: center;
      gap: 2rem;
    }

    .nav-menu.active {
      left: 0;
    }

    .nav-menu li {
      margin: 1rem 0;
    }

    .hamburger {
      display: block;
    }

    .hamburger.active .bar:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active .bar:nth-child(1) {
      transform: translateY(8px) rotate(45deg);
    }

    .hamburger.active .bar:nth-child(3) {
      transform: translateY(-8px) rotate(-45deg);
    }
  }

  .hero {
    position: relative;
    min-height: 80vh;
    height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 0;
    background-size: cover;
    background-position: center;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: rgba(160, 82, 45, 0.35);
    backdrop-filter: blur(2px);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    color: #fff8e7;
  }

  .hero-content h1 {
    font-size: 2.3rem;
    margin-bottom: 0.5rem;
    letter-spacing: 1px;
  }

  .hero-content p {
    font-size: 1.1rem;
    margin-bottom: 1.2rem;
  }

  .search-bar-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto;
    max-width: 420px;
    background: rgba(255,255,255,0.7);
    border-radius: 24px;
    box-shadow: 0 2px 8px rgba(160,82,45,0.10);
    padding: 0.3rem 0.5rem;
  }

  .search-bar {
    flex: 1;
    border: none;
    outline: none;
    padding: 0.7rem 1rem;
    border-radius: 20px 0 0 20px;
    font-size: 1rem;
    background: transparent;
  }

  .search-btn {
    border: none;
    background: none;
    color: #a0522d;
    font-size: 1.3rem;
    cursor: pointer;
    padding: 0 1rem;
  }

  /* Fullscreen background video */
  .bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -1;
    pointer-events: none;
  }

  .anime-overlay {
    position: fixed;
    inset: 0;
    background: rgba(160, 82, 45, 0.18);
    z-index: 0;
    pointer-events: none;
  }

  main {
    flex: 1 0 auto;
    width: 100%;
    padding: 0 0 2rem 0;
  }

  
    </style>
</head>
<body class="welcome-page">
  <video autoplay loop muted playsinline class="bg-video">
    <source src="Visit Rwanda Soon.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <div class="anime-overlay"></div>
  <div class="glass-form">
    <img src="../assets/images/branding/blueprint-logo.png" alt="Blueprint Rwanda Logo" class="logo">
    <h1>Blueprint Rwanda</h1>
    <p class="subtitle">Your Online Agency for:</p>
    <ul class="services">
      <li>Accommodation</li>
      <li>Place to Visit</li>
      <li>Rent Car</li>
    </ul>
    <button onclick="window.location.href='dashboard.html'" class="welcome-btn">Welcome</button>
  </div>
</body>
</html>
