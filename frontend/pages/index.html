<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueprint Rwanda - Your Online Agency for Rwanda</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        /* Page-specific overrides */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--text);
        }
        
        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            z-index: 1;
        }
        
        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: var(--white);
            max-width: 800px;
        }

        .welcome-card {
            padding: var(--space-md);
            border-radius: var(--radius-lg);
            max-width: 480px;
            margin: 0 auto;
        }

        .welcome-card h1 {
            color: var(--primary);
            font-size: 3rem;
            margin-bottom: var(--space-sm);
        }

        .services-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin: var(--space-sm) 0 var(--space-md);
        }

        .services-list li {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--primary-dark);
        }

        @media (max-width: 600px) {
            .welcome-card h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body data-no-navbar>
    <section class="hero">
        <video autoplay loop muted playsinline class="hero-video">
            <source src="Visit Rwanda Soon.mp4" type="video/mp4">
        </video>
        
        <div class="hero-content" data-animate>
            <div class="welcome-card glass">
                <img src="../assets/images/branding/blueprint-logo.png" alt="Blueprint Rwanda Logo" style="width: 160px; margin-bottom: 1rem;">
                <h1>Blueprint Rwanda</h1>
                <p class="subtitle">Your Premier Online Agency for:</p>
                <ul class="services-list">
                    <li><i class="fas fa-bed"></i> Accommodation</li>
                    <li><i class="fas fa-map-marked-alt"></i> Places to Visit</li>
                    <li><i class="fas fa-car-side"></i> Rent Car</li>
                </ul>
                <a href="dashboard.html" class="btn btn-primary">Welcome to Rwanda</a>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
</body>
</html>
