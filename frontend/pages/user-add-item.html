<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Listing - Owner</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .add-main {
            padding-top: 100px;
            padding-bottom: var(--space-lg);
            max-width: 800px;
            margin: 0 auto;
        }

        .add-header {
            text-align: center;
            margin-bottom: var(--space-md);
        }

        .type-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .type-option {
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            transition: var(--transition);
            background: var(--white);
        }

        .type-option i {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            display: block;
            color: var(--text-muted);
        }

        .type-option.active {
            border-color: var(--primary);
            background: var(--surface);
        }

        .type-option.active i {
            color: var(--primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group.full {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--white);
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        @media (max-width: 600px) {
            .type-selector {
                grid-template-columns: 1fr;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <main class="add-main container">
        <header class="add-header" data-animate>
            <h1>List Your Service</h1>
            <p>Choose a category and fill in the details to start earning.</p>
        </header>

        <section class="type-selector" data-animate style="transition-delay: 0.1s;">
            <div class="type-option active" data-type="accommodation">
                <i class="fas fa-home"></i>
                <div>Accommodation</div>
            </div>
            <div class="type-option" data-type="car">
                <i class="fas fa-car"></i>
                <div>Car Rental</div>
            </div>
            <div class="type-option" data-type="place">
                <i class="fas fa-mountain"></i>
                <div>Experience/Tour</div>
            </div>
        </section>

        <section class="card" data-animate style="transition-delay: 0.2s; padding: 2rem;">
            <form id="addItemForm" class="form-grid">
                <div class="form-group full">
                    <label id="nameLabel">Property Name</label>
                    <input type="text" id="itemName" placeholder="e.g. Modern Villa with Pool" required>
                </div>

                <div class="form-group">
                    <label id="locationLabel">Location / City</label>
                    <input type="text" id="itemLocation" placeholder="Kigali" required>
                </div>

                <div class="form-group">
                    <label id="priceLabel">Price per Night ($)</label>
                    <input type="number" id="itemPrice" placeholder="50" required>
                </div>

                <div class="form-group full">
                    <label>Description</label>
                    <textarea id="itemDesc" rows="4" placeholder="Describe what makes your service unique..."></textarea>
                </div>

                <div class="form-group full">
                    <label>Upload Media</label>
                    <div style="border: 2px dashed var(--border); padding: 3rem; text-align: center; border-radius: var(--radius-md); background: var(--bg); cursor: pointer;">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
                        <p style="font-weight: 700;">Drag and drop photos here</p>
                        <p style="font-size: 0.8rem; color: var(--text-muted);">High quality JPEG or PNG</p>
                    </div>
                </div>

                <div class="form-actions full">
                    <button type="button" class="btn btn-secondary" onclick="history.back()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Submit for Review</button>
                </div>
            </form>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        const typeOptions = document.querySelectorAll('.type-option');
        const nameLabel = document.getElementById('nameLabel');
        const priceLabel = document.getElementById('priceLabel');

        typeOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                typeOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                
                const type = opt.dataset.type;
                if (type === 'accommodation') {
                    nameLabel.textContent = 'Property Name';
                    priceLabel.textContent = 'Price per Night ($)';
                } else if (type === 'car') {
                    nameLabel.textContent = 'Vehicle Model';
                    priceLabel.textContent = 'Daily Rental Rate ($)';
                } else if (type === 'place') {
                    nameLabel.textContent = 'Experience Title';
                    priceLabel.textContent = 'Price per Tour ($)';
                }
            });
        });

        document.getElementById('addItemForm').onsubmit = function(e) {
            e.preventDefault();
            Components.showToast('Listing submitted! Our team will review it within 24 hours.', 'success');
            setTimeout(() => {
                location.href = 'partner-dashboard.html';
            }, 1500);
        };
    </script>
</body>
</html>
