<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings - Blueprint Rwanda</title>
    <style>
  /* General Body Styles */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f5e9da; /* beige */
    color: #4e2e0e; /* chocolate */
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Button style used */
  .welcome-btn { background: #a0522d; color: #fff8e7; border: none; border-radius: 20px; padding: 0.8rem 2.2rem; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 2px 8px rgba(160,82,45,0.15); transition: background 0.2s; }
  .welcome-btn:hover { background: #7c3f17; }

  .welcome-btn {
    background: #a0522d;
    color: #fff8e7;
    border: none;
    border-radius: 20px;
    padding: 0.8rem 2.2rem;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(160, 82, 45, 0.15);
    transition: background 0.2s;
  }

  .welcome-btn:hover {
    background: #7c3f17;
  }

  

  .navbar {
    position: sticky;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(160, 82, 45, 0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    z-index: 1000;
    height: 70px;
    box-shadow: 0 4px 20px rgba(160, 82, 45, 0.15);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    font-size: 1.4rem;
    font-weight: bold;
    color: #fff8e7;
    cursor: pointer;
    text-decoration: none;
  }

  .nav-logo img {
    width: 60px;
    height: 60px;
    object-fit: contain;
    transition: transform 0.3s ease;
  }

  .nav-logo:hover img {
    transform: scale(1.1);
  }

  .nav-menu {
    list-style: none;
    display: flex;
    gap: 2rem;
    margin: 0;
    padding: 0;
    align-items: center;
  }

  .nav-menu li a {
    color: #fff8e7;
    text-decoration: none;
    font-size: 1.1rem;
    font-weight: 500;
    transition: color 0.3s ease;
    position: relative;
    padding: 5px 0;
  }

  .nav-menu li a:hover {
    color: #ffe4b5;
  }

  .nav-menu li a::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 2px;
    bottom: 0;
    left: 0;
    background-color: #ffe4b5;
    transform: scaleX(0);
    transform-origin: bottom right;
    transition: transform 0.25s ease-out;
  }

  .nav-menu li a:hover::after {
    transform: scaleX(1);
    transform-origin: bottom left;
  }

  .nav-cta a {
    background-color: #fff8e7;
    color: #a0522d;
    padding: 0.5rem 1.5rem;
    border-radius: 20px;
    font-weight: bold;
    text-decoration: none;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  .nav-cta a:hover {
    background-color: #ffe4b5;
    color: #7c3f17;
  }

  .hamburger {
    display: none;
    cursor: pointer;
    background: transparent;
    border: none;
    padding: 0;
    z-index: 1001;
  }

  .bar {
    display: block;
    width: 25px;
    height: 3px;
    margin: 5px auto;
    background-color: #fff8e7;
    transition: all 0.3s ease-in-out;
  }

  @media (max-width: 850px) {
    .nav-menu {
      position: fixed;
      left: -100%;
      top: 0;
      flex-direction: column;
      background-color: rgba(160, 82, 45, 0.98);
      width: 100%;
      height: 100vh;
      text-align: center;
      transition: 0.3s;
      box-shadow: 0 10px 27px rgba(0, 0, 0, 0.05);
      justify-content: center;
      gap: 2rem;
    }

    .nav-menu.active {
      left: 0;
    }

    .nav-menu li {
      margin: 1rem 0;
    }

    .hamburger {
      display: block;
    }

    .hamburger.active .bar:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active .bar:nth-child(1) {
      transform: translateY(8px) rotate(45deg);
    }

    .hamburger.active .bar:nth-child(3) {
      transform: translateY(-8px) rotate(-45deg);
    }
  }

  .hero {
    position: relative;
    min-height: 80vh;
    height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 0;
    background-size: cover;
    background-position: center;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: rgba(160, 82, 45, 0.35);
    backdrop-filter: blur(2px);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    color: #fff8e7;
  }

  .hero-content h1 {
    font-size: 2.3rem;
    margin-bottom: 0.5rem;
    letter-spacing: 1px;
  }

  .hero-content p {
    font-size: 1.1rem;
    margin-bottom: 1.2rem;
  }

  .search-bar-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto;
    max-width: 420px;
    background: rgba(255,255,255,0.7);
    border-radius: 24px;
    box-shadow: 0 2px 8px rgba(160,82,45,0.10);
    padding: 0.3rem 0.5rem;
  }

  .search-bar {
    flex: 1;
    border: none;
    outline: none;
    padding: 0.7rem 1rem;
    border-radius: 20px 0 0 20px;
    font-size: 1rem;
    background: transparent;
  }

  .search-btn {
    border: none;
    background: none;
    color: #a0522d;
    font-size: 1.3rem;
    cursor: pointer;
    padding: 0 1rem;
  }

  main {
    flex: 1 0 auto;
    width: 100%;
    padding: 0 0 2rem 0;
  }

  /* ... (Add other specific component styles here, like listing-card, modal, etc.) ... */ 
    </style>
  <style>
    body { background: #fff8e7; font-family: 'Segoe UI', 'Roboto', Arial, sans-serif; }
    .bookings-container { max-width: 800px; margin: 3rem auto; background: #fff; border-radius: 18px; box-shadow: 0 8px 48px #a0522d22; padding: 2.5rem 2rem; }
    .bookings-title { font-size: 2rem; color: #a0522d; font-weight: 700; margin-bottom: 2rem; text-align: center; }
    .booking-card { background: #fff8e7; border-radius: 12px; box-shadow: 0 1.5px 8px #a0522d11; padding: 1.2rem 1.5rem; margin-bottom: 1.5rem; border-left: 4px solid #ffe4b5; }
    .booking-card h4 { color: #a0522d; font-size: 1.18rem; margin-bottom: 0.5rem; font-weight: 700; }
    .booking-meta { color: #4e2e0e; font-size: 1.08rem; margin-bottom: 0.5rem; }
    .booking-date { color: #b08a5a; font-size: 1.01rem; margin-bottom: 0.5rem; }
    .booking-status { color: #fff8e7; background: #a0522d; border-radius: 8px; padding: 0.18rem 0.7rem; font-size: 0.98rem; font-weight: 700; display: inline-block; }
  </style>
</head>
<body>
  <div class="bookings-container">
    <div class="bookings-title">My Bookings</div>
    <div class="booking-card">
      <h4>Kigali View Apartment</h4>
      <div class="booking-meta">Kigali, $40/night</div>
      <div class="booking-date">Check-in: July 10, 2025</div>
      <div class="booking-status">Confirmed</div>
    </div>
    <div class="booking-card">
      <h4>Toyota RAV4</h4>
      <div class="booking-meta">Automatic, 5 seats, $50/day</div>
      <div class="booking-date">Rental: June 15, 2025</div>
      <div class="booking-status" style="background:#ffb347;color:#a0522d;">Completed</div>
    </div>
  </div>
</body>
</html>
