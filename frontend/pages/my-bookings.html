<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Blueprint Rwanda</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .bookings-main {
            padding-top: 120px;
            padding-bottom: var(--space-lg);
        }

        .bookings-header {
            margin-bottom: var(--space-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .filter-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .filter-tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: var(--transition);
        }

        .filter-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .booking-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .booking-card {
            display: grid;
            grid-template-columns: 200px 1fr 200px;
            gap: 2rem;
            padding: 1.5rem;
            align-items: center;
        }

        .booking-img {
            width: 100%;
            height: 120px;
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .booking-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .booking-details h3 {
            margin-bottom: 0.5rem;
        }

        .booking-meta {
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .booking-meta i {
            width: 16px;
            text-align: center;
            margin-right: 0.25rem;
        }

        .booking-status {
            text-align: right;
        }

        .status-badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: var(--radius-pill);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .status-confirmed { background: #c6f6d5; color: #2f855a; }
        .status-completed { background: #ebf8ff; color: #2b6cb0; }
        .status-pending { background: #feebc8; color: #c05621; }

        @media (max-width: 900px) {
            .booking-card {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .booking-img {
                height: 200px;
            }
            .booking-status {
                text-align: left;
                padding-top: 1rem;
                border-top: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>
    <main class="bookings-main container">
        <header class="bookings-header" data-animate>
            <div>
                <h1>My Reservations</h1>
                <p>Track and manage your upcoming and past experiences.</p>
            </div>
            <button class="btn btn-secondary" onclick="location.href='dashboard.html'">Back to Hub</button>
        </header>

        <div class="filter-tabs" data-animate style="transition-delay: 0.1s;">
            <div class="filter-tab active">Upcoming</div>
            <div class="filter-tab">Completed</div>
            <div class="filter-tab">Cancelled</div>
        </div>

        <section class="booking-list">
            <!-- Booking 1 -->
            <div class="card booking-card" data-animate style="transition-delay: 0.2s;">
                <div class="booking-img">
                    <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&q=80&w=400" alt="">
                </div>
                <div class="booking-details">
                    <div class="status-badge status-confirmed">Confirmed</div>
                    <h3>Kigali View Apartment</h3>
                    <div class="booking-meta">
                        <span><i class="fas fa-calendar-alt"></i> Oct 12 - Oct 15, 2025</span>
                        <span><i class="fas fa-user-friends"></i> 2 Guests</span>
                    </div>
                    <p style="margin-top: 1rem; font-size: 0.9rem;"><i class="fas fa-map-marker-alt" style="color: var(--primary);"></i> Kiyovu, Kigali</p>
                </div>
                <div class="booking-status">
                    <div style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem;">$150.00</div>
                    <button class="btn btn-secondary w-100" onclick="location.href='item-details.html'">View Details</button>
                </div>
            </div>

            <!-- Booking 2 -->
            <div class="card booking-card" data-animate style="transition-delay: 0.3s;">
                <div class="booking-img">
                    <img src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?auto=format&fit=crop&q=80&w=400" alt="">
                </div>
                <div class="booking-details">
                    <div class="status-badge status-pending">Pending Approval</div>
                    <h3>Toyota RAV4 Rental</h3>
                    <div class="booking-meta">
                        <span><i class="fas fa-calendar-alt"></i> Oct 20 - Oct 22, 2025</span>
                        <span><i class="fas fa-cog"></i> Automatic</span>
                    </div>
                    <p style="margin-top: 1rem; font-size: 0.9rem;"><i class="fas fa-map-marker-alt" style="color: var(--primary);"></i> Kigali Airport Pickup</p>
                </div>
                <div class="booking-status">
                    <div style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem;">$120.00</div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn btn-secondary" style="flex: 1;" onclick="location.href='item-details.html'">View</button>
                        <button class="btn btn-secondary" style="color: #e53e3e; border-color: #feb2b2;">Cancel</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            };
        });
    </script>
</body>
</html>
