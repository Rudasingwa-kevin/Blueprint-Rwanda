<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Blueprint Rwanda</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .profile-main {
            padding-top: 120px;
            padding-bottom: var(--space-lg);
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            align-items: start;
        }

        .profile-sidebar {
            position: sticky;
            top: 100px;
            text-align: center;
            padding: 2rem;
        }

        .profile-avatar-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 1.5rem auto;
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--surface);
            box-shadow: var(--shadow-md);
        }

        .edit-avatar-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 35px;
            height: 35px;
            background: var(--primary);
            color: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid var(--white);
            transition: var(--transition);
        }

        .edit-avatar-btn:hover {
            transform: scale(1.1);
        }

        .profile-nav {
            margin-top: 2rem;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .profile-nav-item {
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
        }

        .profile-nav-item:hover, .profile-nav-item.active {
            background: var(--surface);
            color: var(--primary);
        }

        .profile-card {
            padding: 2.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group.full {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg);
        }

        @media (max-width: 900px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
            .profile-sidebar {
                position: static;
            }
        }
    </style>
</head>
<body>
    <main class="profile-main container">
        <div class="profile-grid">
            <!-- Sidebar -->
            <aside class="card profile-sidebar" data-animate>
                <div class="profile-avatar-wrapper">
                    <img src="https://randomuser.me/api/portraits/men/41.jpg" alt="Samuel N." class="profile-avatar" id="avatarImg">
                    <label for="avatarInput" class="edit-avatar-btn"><i class="fas fa-camera"></i></label>
                    <input type="file" id="avatarInput" hidden accept="image/*">
                </div>
                <h2 id="displayName">Samuel N.</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Member since 2024</p>

                <nav class="profile-nav">
                    <div class="profile-nav-item active"><i class="fas fa-user"></i> Personal Info</div>
                    <div class="profile-nav-item" onclick="location.href='my-bookings.html'"><i class="fas fa-calendar-alt"></i> My Bookings</div>
                    <div class="profile-nav-item"><i class="fas fa-heart"></i> Saved Items</div>
                    <div class="profile-nav-item"><i class="fas fa-shield-alt"></i> Security</div>
                    <div class="profile-nav-item" style="color: #e53e3e; margin-top: 1rem;"><i class="fas fa-sign-out-alt"></i> Logout</div>
                </nav>
            </aside>

            <!-- Main Content -->
            <div class="card profile-card" data-animate style="transition-delay: 0.1s;">
                <header style="margin-bottom: 2rem;">
                    <h3>Personal Information</h3>
                    <p style="color: var(--text-muted);">Manage your account details and preferences.</p>
                </header>

                <form id="profileForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="fullName" value="Samuel N." required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="email" value="samuel@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" value="+250 788 123 456">
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" value="Kigali">
                        </div>
                        <div class="form-group full">
                            <label>Bio</label>
                            <textarea rows="4">Passionate traveler and landscape photographer exploring the beauty of Rwanda one hill at a time.</textarea>
                        </div>
                    </div>

                    <div style="border-top: 1px solid var(--border); padding-top: 2rem; margin-top: 1rem; display: flex; justify-content: flex-end; gap: 1rem;">
                        <button type="button" class="btn btn-secondary">Discard Changes</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        // Sync display name
        document.getElementById('fullName').addEventListener('input', (e) => {
            document.getElementById('displayName').textContent = e.target.value;
        });

        // Avatar preview
        document.getElementById('avatarInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('avatarImg').src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Form submit
        document.getElementById('profileForm').onsubmit = (e) => {
            e.preventDefault();
            localStorage.setItem('profileName', document.getElementById('fullName').value);
            alert('Profile updated successfully!');
        };
    </script>
</body>
</html>
