<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - Blueprint Rwanda</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/blueprint-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .search-main {
            padding-top: 120px;
            padding-bottom: var(--space-lg);
        }

        .search-controls {
            margin-bottom: var(--space-lg);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input-wrapper {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        @media (max-width: 600px) {
            .search-input-wrapper {
                min-width: 100%;
            }
            .search-controls select, .search-controls button {
                flex: 1;
            }
        }

        .search-input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input-wrapper input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border);
            background: var(--white);
            font-size: 1.1rem;
            box-shadow: var(--shadow-sm);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .result-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .result-img {
            height: 200px;
            overflow: hidden;
        }

        .result-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-info {
            padding: 1.5rem;
        }

        .result-type {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .result-title {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .result-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .result-price {
            font-weight: 700;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <main class="search-main container">
        <header data-animate>
            <h1 style="margin-bottom: 0.5rem;">Explore Rwanda</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Found 12 matches for your search.</p>
        </header>

        <div class="search-controls" data-animate style="transition-delay: 0.1s;">
            <div class="search-input-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search homes, cars, or sites..." value="Kigali">
            </div>
            <select class="btn btn-secondary" style="height: 52px; border-radius: 26px; padding: 0 1.5rem;">
                <option>All Types</option>
                <option>Accommodation</option>
                <option>Cars</option>
                <option>Tours</option>
            </select>
            <button class="btn btn-primary" style="height: 52px; border-radius: 26px;">Apply Filters</button>
        </div>

        <section class="results-grid">
            <!-- Result 1 -->
            <div class="result-card" data-animate style="transition-delay: 0.2s;">
                <div class="result-img">
                    <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&q=80&w=800" alt="">
                </div>
                <div class="result-info">
                    <div class="result-type">Accommodation</div>
                    <h3 class="result-title">Kigali View Apartment</h3>
                    <p style="font-size: 0.9rem; color: var(--text-muted);"><i class="fas fa-map-marker-alt"></i> Kiyovu, Kigali</p>
                    <div class="result-meta">
                        <div class="result-price">$50 <small>/ night</small></div>
                        <div class="rating"><i class="fas fa-star" style="color: #f6ad55;"></i> 4.9</div>
                    </div>
                </div>
            </div>

            <!-- Result 2 -->
            <div class="result-card" data-animate style="transition-delay: 0.3s;">
                <div class="result-img">
                    <img src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?auto=format&fit=crop&q=80&w=800" alt="">
                </div>
                <div class="result-info">
                    <div class="result-type">Car Rental</div>
                    <h3 class="result-title">Toyota RAV4</h3>
                    <p style="font-size: 0.9rem; color: var(--text-muted);"><i class="fas fa-cog"></i> Automatic • 5 Seats</p>
                    <div class="result-meta">
                        <div class="result-price">$60 <small>/ day</small></div>
                        <div class="rating"><i class="fas fa-star" style="color: #f6ad55;"></i> 4.8</div>
                    </div>
                </div>
            </div>

            <!-- Result 3 -->
            <div class="result-card" data-animate style="transition-delay: 0.4s;">
                <div class="result-img">
                    <img src="https://images.unsplash.com/photo-1516422213481-9069d30560fe?auto=format&fit=crop&q=80&w=800" alt="">
                </div>
                <div class="result-info">
                    <div class="result-type">Tour</div>
                    <h3 class="result-title">Volcanoes National Park</h3>
                    <p style="font-size: 0.9rem; color: var(--text-muted);"><i class="fas fa-hiking"></i> Musanze • Guided</p>
                    <div class="result-meta">
                        <div class="result-price">$150 <small>/ person</small></div>
                        <div class="rating"><i class="fas fa-star" style="color: #f6ad55;"></i> 5.0</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
</body>
</html>
