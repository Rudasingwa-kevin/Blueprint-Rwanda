<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Blueprint Rwanda</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        body {
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 1rem;
            z-index: 10;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header img {
            width: 80px;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--white);
        }

        .back-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
        }

        .back-link a {
            color: var(--primary);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" data-animate>
            <div class="auth-header">
                <img src="../assets/images/branding/title-logo.png" alt="Blueprint Rwanda">
                <h2>Reset Password</h2>
                <p style="color: var(--text-muted);">Enter your email to receive a reset link.</p>
            </div>

            <form id="resetRequestForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="john@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="padding: 1rem;">Send Reset Link</button>
            </form>

            <div class="back-link">
                <p>Remember your password? <a href="verification.html">Back to Login</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        document.getElementById('resetRequestForm').onsubmit = function(e) {
            e.preventDefault();
            alert('A password reset link has been sent to your email.');
            window.location.href = 'verification.html';
        };
    </script>
</body>
</html>
