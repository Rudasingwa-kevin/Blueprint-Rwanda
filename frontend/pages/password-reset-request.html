<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueprint Rwanda - Reset Request</title>
  <link rel="stylesheet" href="../assets/css/global-responsive.css">
  <link rel="stylesheet" href="../assets/css/ui-system.css">
  <link rel="stylesheet" href="../assets/css/auth-pages.css">
</head>
<body>
  <video autoplay loop muted playsinline class="bg-video"><source src="Visit Rwanda Soon.mp4" type="video/mp4"></video>
  <div class="anime-overlay"></div>
  <nav class="navbar">
    <a href="index.html" class="nav-logo"><img src="../assets/images/branding/blueprint-logo.png" alt="Blueprint Rwanda Logo">Blueprint Rwanda</a>
    <ul class="nav-menu"><li><a href="portfolio.html">Portfolio</a></li><li><a href="contact.html">Contact</a></li></ul>
    <div class="nav-cta"><a href="login.html">Login</a></div>
    <button class="hamburger"><span class="bar"></span><span class="bar"></span><span class="bar"></span></button>
  </nav>
  <main class="auth-main">
    <section class="auth-card">
      <img src="../assets/images/branding/blueprint-logo.png" alt="Blueprint Rwanda Logo" class="auth-logo">
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Enter your email and we will send a reset link.</p>
      <form id="resetForm" class="auth-form" onsubmit="handlePasswordReset(event)">
        <div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" required placeholder="Enter your email address"></div>
        <div id="alert" class="alert hidden"></div>
        <div id="success" class="success hidden">Password reset link sent! Check your email.</div>
        <button type="submit" class="welcome-btn" id="resetBtn">Send Reset Link</button>
        <p class="form-meta">Remember your password? <span class="form-link" onclick="window.location.href='login.html'">Login</span></p>
      </form>
    </section>
  </main>
  <script src="../assets/js/api-config.js"></script>
  <script src="../assets/js/api-client.js"></script>
  <script src="../assets/js/auth-guard.js"></script>
  <script>
    async function handlePasswordReset(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const alertDiv = document.getElementById('alert');
      const successDiv = document.getElementById('success');
      const resetBtn = document.getElementById('resetBtn');
      alertDiv.classList.add('hidden'); successDiv.classList.add('hidden');
      resetBtn.disabled = true; resetBtn.textContent = 'Sending...';
      try {
        await window.BP_API.post('/auth/forgot-password', { email });
        successDiv.classList.remove('hidden');
        document.getElementById('resetForm').reset();
      } catch (error) {
        alertDiv.textContent = error.message || 'Failed to send reset link. Please try again.';
        alertDiv.classList.remove('hidden');
      } finally {
        resetBtn.disabled = false; resetBtn.textContent = 'Send Reset Link';
      }
    }
  </script>
  <script src="../assets/js/navbar.js"></script>
</body>
</html>
