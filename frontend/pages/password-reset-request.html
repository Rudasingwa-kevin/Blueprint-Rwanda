<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restore Access - Blueprint Rwanda</title>
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .auth-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }

        .auth-visual {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 4rem;
            color: var(--white);
        }

        .auth-form-side {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            background: var(--bg);
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
        }

        .auth-header {
            margin-bottom: 3rem;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.75rem;
            color: var(--primary);
        }

        .form-control {
            width: 100%;
            padding: 1.1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--white);
            color: var(--text);
            font-weight: 500;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(160, 82, 45, 0.08);
        }

        .back-to-login {
            margin-top: 2rem;
            text-align: center;
            font-weight: 700;
            font-size: 0.9rem;
        }

        @media (max-width: 992px) {
            .auth-split { grid-template-columns: 1fr; }
            .auth-visual { display: none; }
            .auth-form-side { padding: 2rem; }
        }
    </style>
</head>
<body data-no-navbar data-no-footer>
    <main class="auth-split">
        <div class="auth-visual" data-animate>
            <div>
                <h2 style="font-size: 3rem; margin-bottom: 1rem;">Seamless Recovery.</h2>
                <p style="font-size: 1.25rem; opacity: 0.9; font-weight: 300;">Restoring your connection to Rwanda's digital hub.</p>
            </div>
        </div>
        
        <div class="auth-form-side">
            <div class="auth-card" data-animate style="transition-delay: 0.2s;">
                <div class="auth-header">
                    <img src="../assets/images/branding/title-logo.png" alt="Blueprint Rwanda" style="width: 60px; margin-bottom: 2rem;">
                    <h1 class="gradient-text" style="font-size: 2.5rem; margin-bottom: 0.75rem;">Restore Access</h1>
                    <p style="color: var(--text-muted);">Enter your verified email address and we will synchronize a reset link to your inbox.</p>
                </div>

                <form id="resetRequestForm">
                    <div class="form-group">
                        <label>Verified Email Address</label>
                        <input type="email" class="form-control" placeholder="delegate@blueprint.rw" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100" style="padding: 1.1rem;">Transmit Reset Link</button>
                    
                    <div class="back-to-login">
                        <a href="login.html" style="color: var(--primary); text-decoration: none;">Recalled credentials? <span style="text-decoration: underline;">Back to Secure Login</span></a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        document.getElementById('resetRequestForm').onsubmit = function(e) {
            e.preventDefault();
            Components.showToast('Reset link synthesized and transmitted', 'success');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        };
    </script>
</body>
</html>
