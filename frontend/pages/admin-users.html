<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Admin</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .admin-main {
            padding-top: 100px;
            padding-bottom: var(--space-lg);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-lg);
        }

        .admin-title-group h1 {
            font-size: 2.25rem;
            color: var(--primary);
        }

        .admin-title-group p {
            color: var(--text-muted);
        }

        .table-container {
            margin-top: 1rem;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--white);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        th {
            background: var(--bg);
            padding: 1rem;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:hover {
            background: var(--bg);
        }

        .user-preview {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .role-badge {
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-pill);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .role-admin { background: #fee2e2; color: #991b1b; }
        .role-moderator { background: #e0f2fe; color: #075985; }
        .role-user { background: #f0fdf4; color: #166534; }

        .btn-action {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--white);
            color: var(--text-muted);
            transition: var(--transition);
        }

        .btn-action:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        .btn-delete:hover {
            color: var(--danger);
            border-color: var(--danger);
        }
    </style>
</head>
<body>
    <main class="admin-main container">
        <header class="admin-header" data-animate>
            <div class="admin-title-group">
                <h1>User Management</h1>
                <p>Manage platform access and user permissions.</p>
            </div>
            <button class="btn btn-primary" onclick="location.href='add-user.html'">
                <i class="fas fa-user-plus"></i> Add User
            </button>
        </header>

        <section class="card" data-animate style="transition-delay: 0.1s; padding: 0;">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Date Joined</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Row 1 -->
                        <tr>
                            <td>
                                <div class="user-preview">
                                    <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=100" alt="" class="user-avatar">
                                    <div style="font-weight: 700; color: var(--primary);">Samuel Niyonkuru</div>
                                </div>
                            </td>
                            <td>samuel@example.com</td>
                            <td><span class="role-badge role-admin">Admin</span></td>
                            <td>Jan 12, 2024</td>
                            <td style="text-align: right;">
                                <button class="btn-action"><i class="fas fa-edit"></i></button>
                                <button class="btn-action btn-delete"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                        <!-- Row 2 -->
                        <tr>
                            <td>
                                <div class="user-preview">
                                    <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=100" alt="" class="user-avatar">
                                    <div style="font-weight: 700; color: var(--primary);">Mary Kamanzi</div>
                                </div>
                            </td>
                            <td>mary@blueprintrwanda.com</td>
                            <td><span class="role-badge role-moderator">Moderator</span></td>
                            <td>Feb 05, 2024</td>
                            <td style="text-align: right;">
                                <button class="btn-action"><i class="fas fa-edit"></i></button>
                                <button class="btn-action btn-delete"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                        <!-- Row 3 -->
                        <tr>
                            <td>
                                <div class="user-preview">
                                    <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&q=80&w=100" alt="" class="user-avatar">
                                    <div style="font-weight: 700; color: var(--primary);">Eric Mugisha</div>
                                </div>
                            </td>
                            <td>eric@blueprintrwanda.com</td>
                            <td><span class="role-badge role-user">User</span></td>
                            <td>Mar 20, 2024</td>
                            <td style="text-align: right;">
                                <button class="btn-action"><i class="fas fa-edit"></i></button>
                                <button class="btn-action btn-delete"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
</body>
</html>
