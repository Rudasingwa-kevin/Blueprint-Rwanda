<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Accommodation - Admin</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .form-main {
            padding-top: 100px;
            padding-bottom: var(--space-lg);
            max-width: 800px;
            margin: 0 auto;
        }

        .form-header {
            margin-bottom: var(--space-md);
        }

        .form-header h1 {
            font-size: 2rem;
            color: var(--primary);
        }

        .form-card {
            padding: var(--space-md);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group.full {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--white);
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .image-upload-box {
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 2rem;
            text-align: center;
            background: var(--bg);
            cursor: pointer;
            transition: var(--transition);
        }

        .image-upload-box:hover {
            border-color: var(--primary);
            background: var(--surface);
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <main class="form-main container">
        <header class="form-header" data-animate>
            <h1>Add New Accommodation</h1>
            <p>Fill in the details below to list a new property.</p>
        </header>

        <section class="card form-card" data-animate style="transition-delay: 0.1s;">
            <form id="accommodationForm" class="form-grid">
                <!-- Basic Info -->
                <div class="form-group full">
                    <label for="title">Property Title</label>
                    <input type="text" id="title" placeholder="e.g. Modern Apartment in Kiyovu" required>
                </div>

                <div class="form-group">
                    <label for="type">Property Type</label>
                    <select id="type">
                        <option value="apartment">Apartment</option>
                        <option value="house">House</option>
                        <option value="villa">Villa</option>
                        <option value="studio">Studio</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="price">Price per Night ($)</label>
                    <input type="number" id="price" placeholder="50" required>
                </div>

                <!-- Location -->
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" placeholder="Kigali" required>
                </div>

                <div class="form-group">
                    <label for="neighborhood">Neighborhood</label>
                    <input type="text" id="neighborhood" placeholder="Kiyovu">
                </div>

                <div class="form-group full">
                    <label for="description">Detailed Description</label>
                    <textarea id="description" placeholder="Describe the property, amenities, and surroundings..."></textarea>
                </div>

                <!-- Specs -->
                <div class="form-group">
                    <label for="bedrooms">Bedrooms</label>
                    <input type="number" id="bedrooms" value="1" min="1">
                </div>

                <div class="form-group">
                    <label for="bathrooms">Bathrooms</label>
                    <input type="number" id="bathrooms" value="1" min="1">
                </div>

                <!-- Media -->
                <div class="form-group full">
                    <label>Property Photos</label>
                    <div class="image-upload-box">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
                        <p style="font-weight: 600; margin-bottom: 0.25rem;">Click to upload or drag and drop</p>
                        <p style="font-size: 0.8rem; color: var(--text-muted);">PNG, JPG (max. 5MB per file)</p>
                    </div>
                </div>

                <div class="form-actions full">
                    <button type="button" class="btn btn-secondary" onclick="history.back()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Publish Listing</button>
                </div>
            </form>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        document.getElementById('accommodationForm').onsubmit = function(e) {
            e.preventDefault();
            alert('Listing saved successfully!');
            location.href = 'admin-accommodations.html';
        };
    </script>
</body>
</html>
