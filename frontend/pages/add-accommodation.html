<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Instant theme sync to prevent flash -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
    <title>Register Estate - Blueprint Rwanda</title>
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body data-no-navbar>
    <!-- Context-Aware Back Navigation -->
    <div id="form-topbar" style="position: fixed; top: 0; left: 0; right: 0; z-index: 9999; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; background: var(--surface); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px);">
        <button onclick="history.back()" style="background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-weight: 700; color: var(--primary); font-size: 0.95rem;">
            <i class="fas fa-arrow-left"></i> Back
        </button>
        <span style="opacity: 0.3;">|</span>
        <span id="context-label" style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Register Estate</span>
    </div>
    <main class="admin-main container">
        <header class="admin-header" data-animate>
            <div class="admin-title">
                <h1 class="gradient-text">Register Estate</h1>
                <p>Establishing the parameters for a new premium listing.</p>
            </div>
            <div class="admin-actions">
                <button class="btn btn-secondary" onclick="history.back()">Discard Changes</button>
            </div>
        </header>

        <section class="admin-form-container">
            <div class="card glass" style="padding: 3rem;" data-animate style="transition-delay: 0.1s;">
                <form id="accommodationForm" class="form-grid">
                    <!-- Identity Section -->
                    <div class="form-group full">
                        <label>Estate Title</label>
                        <input type="text" class="form-control" placeholder="e.g. Skyline Executive Penthouse" required>
                    </div>

                    <div class="form-group">
                        <label>Architecture Class</label>
                        <select class="form-control">
                            <option>Apartment Cluster</option>
                            <option>Standalone Villa</option>
                            <option>Commercial Suite</option>
                            <option>Boutique Stay</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Valuation (USD / Night)</label>
                        <input type="number" class="form-control" placeholder="250" required>
                    </div>

                    <!-- Location Engineering -->
                    <div class="form-group">
                        <label>Administrative District</label>
                        <input type="text" class="form-control" placeholder="Kigali" required>
                    </div>

                    <div class="form-group">
                        <label>Sector / Neighborhood</label>
                        <input type="text" class="form-control" placeholder="Kiyovu">
                    </div>

                    <div class="form-group full">
                        <label>Executive Description</label>
                        <textarea class="form-control" placeholder="Detail the structural advantages, amenities, and proximity to hubs..."></textarea>
                    </div>

                    <!-- Logistics -->
                    <div class="form-group">
                        <label>Residential Units / Bedrooms</label>
                        <input type="number" class="form-control" value="2" min="1">
                    </div>

                    <div class="form-group">
                        <label>Sanitary Links / Bathrooms</label>
                        <input type="number" class="form-control" value="2" min="1">
                    </div>

                    <!-- Visual Assets -->
                    <div class="form-group full">
                        <label>Asset Documentation (Visuals)</label>
                        <div class="upload-zone">
                            <i class="fas fa-camera-retro"></i>
                            <h4>Deploy High-Fidelity Imagery</h4>
                            <p>PNG, JPG up to 12MB. Standards require minimum 4K resolution recommended.</p>
                        </div>
                    </div>

                    <div style="grid-column: span 2; display: flex; justify-content: flex-end; gap: 1.5rem; margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary" style="padding-left: 4rem; padding-right: 4rem;">Authorize Publishing</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="../assets/js/components.js"></script>
    <script>
        // Determine origin context for smart redirect
        const referrer = document.referrer;
        const isPartner = referrer.includes('partner-');
        const returnUrl = isPartner ? 'partner-dashboard.html' : 'admin-inventory.html';

        // Update context label
        const label = document.getElementById('context-label');
        if (label) label.textContent = isPartner ? 'Partner Console → Register Estate' : 'Admin → Register Estate';

        document.getElementById('accommodationForm').onsubmit = function(e) {
            e.preventDefault();
            Components.showToast('Estate Registration Synchronized', 'success');
            setTimeout(() => { location.href = returnUrl; }, 1500);
        };
    </script>
</body>
</html>
