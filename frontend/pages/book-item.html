<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Item - Blueprint Rwanda</title>
    <style>
  /* General Body Styles */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f5e9da; /* beige */
    color: #4e2e0e; /* chocolate */
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Glassmorphism Form for Welcome Page */
  .glass-form {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.4);
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    min-width: 320px;
    max-width: 90vw;
    z-index: 3;
    text-align: center;
  }

  .logo {
    width: 180px;
    margin-bottom: 0.5rem;
  }

  .glass-form h1 {
    color: #a0522d;
    margin-bottom: 0.5rem;
    font-size: 2.2rem;
    letter-spacing: 1px;
  }

  .subtitle {
    font-size: 1.1rem;
    margin-bottom: 1rem;
    color: #4e2e0e;
  }

  .services {
    list-style: none;
    padding: 0;
    margin: 0 0 1.5rem 0;
  }

  .services li {
    font-size: 1.1rem;
    margin: 0.3rem 0;
    color: #a0522d;
    font-weight: 500;
  }

  .welcome-btn {
    background: #a0522d;
    color: #fff8e7;
    border: none;
    border-radius: 20px;
    padding: 0.8rem 2.2rem;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(160, 82, 45, 0.15);
    transition: background 0.2s;
  }

  .welcome-btn:hover {
    background: #7c3f17;
  }

  @media (max-width: 600px) {
    .glass-form {
      padding: 1.2rem 0.5rem;
      min-width: 0;
    }
    .logo {
      width: 110px;
    }
    .glass-form h1 {
      font-size: 1.3rem;
    }
  }

  .navbar {
    position: sticky;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(160, 82, 45, 0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    z-index: 1000;
    height: 70px;
    box-shadow: 0 4px 20px rgba(160, 82, 45, 0.15);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    font-size: 1.4rem;
    font-weight: bold;
    color: #fff8e7;
    cursor: pointer;
    text-decoration: none;
  }

  .nav-logo img {
    width: 60px;
    height: 60px;
    object-fit: contain;
    transition: transform 0.3s ease;
  }

  .nav-logo:hover img {
    transform: scale(1.1);
  }

  .nav-menu {
    list-style: none;
    display: flex;
    gap: 2rem;
    margin: 0;
    padding: 0;
    align-items: center;
  }

  .nav-menu li a {
    color: #fff8e7;
    text-decoration: none;
    font-size: 1.1rem;
    font-weight: 500;
    transition: color 0.3s ease;
    position: relative;
    padding: 5px 0;
  }

  .nav-menu li a:hover {
    color: #ffe4b5;
  }

  .nav-menu li a::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 2px;
    bottom: 0;
    left: 0;
    background-color: #ffe4b5;
    transform: scaleX(0);
    transform-origin: bottom right;
    transition: transform 0.25s ease-out;
  }

  .nav-menu li a:hover::after {
    transform: scaleX(1);
    transform-origin: bottom left;
  }

  .nav-cta a {
    background-color: #fff8e7;
    color: #a0522d;
    padding: 0.5rem 1.5rem;
    border-radius: 20px;
    font-weight: bold;
    text-decoration: none;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  .nav-cta a:hover {
    background-color: #ffe4b5;
    color: #7c3f17;
  }

  .hamburger {
    display: none;
    cursor: pointer;
    background: transparent;
    border: none;
    padding: 0;
    z-index: 1001;
  }

  .bar {
    display: block;
    width: 25px;
    height: 3px;
    margin: 5px auto;
    background-color: #fff8e7;
    transition: all 0.3s ease-in-out;
  }

  @media (max-width: 850px) {
    .nav-menu {
      position: fixed;
      left: -100%;
      top: 0;
      flex-direction: column;
      background-color: rgba(160, 82, 45, 0.98);
      width: 100%;
      height: 100vh;
      text-align: center;
      transition: 0.3s;
      box-shadow: 0 10px 27px rgba(0, 0, 0, 0.05);
      justify-content: center;
      gap: 2rem;
    }

    .nav-menu.active {
      left: 0;
    }

    .nav-menu li {
      margin: 1rem 0;
    }

    .hamburger {
      display: block;
    }

    .hamburger.active .bar:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active .bar:nth-child(1) {
      transform: translateY(8px) rotate(45deg);
    }

    .hamburger.active .bar:nth-child(3) {
      transform: translateY(-8px) rotate(-45deg);
    }
  }

  .hero {
    position: relative;
    min-height: 80vh;
    height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 0;
    background-size: cover;
    background-position: center;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: rgba(160, 82, 45, 0.35);
    backdrop-filter: blur(2px);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    color: #fff8e7;
  }

  .hero-content h1 {
    font-size: 2.3rem;
    margin-bottom: 0.5rem;
    letter-spacing: 1px;
  }

  .hero-content p {
    font-size: 1.1rem;
    margin-bottom: 1.2rem;
  }

  .search-bar-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto;
    max-width: 420px;
    background: rgba(255,255,255,0.7);
    border-radius: 24px;
    box-shadow: 0 2px 8px rgba(160,82,45,0.10);
    padding: 0.3rem 0.5rem;
  }

  .search-bar {
    flex: 1;
    border: none;
    outline: none;
    padding: 0.7rem 1rem;
    border-radius: 20px 0 0 20px;
    font-size: 1rem;
    background: transparent;
  }

  .search-btn {
    border: none;
    background: none;
    color: #a0522d;
    font-size: 1.3rem;
    cursor: pointer;
    padding: 0 1rem;
  }

  main {
    flex: 1 0 auto;
    width: 100%;
    padding: 0 0 2rem 0;
  }

  /* ... (Add other specific component styles here, like listing-card, modal, etc.) ... */ 
    </style>
  <style>
    .book-container { max-width: 500px; margin: 2.5rem auto; background: #fff8e7; border-radius: 16px; box-shadow: 0 2px 16px #a0522d22; padding: 2.5rem 2rem; }
    .book-title { font-size: 1.7rem; color: #a0522d; margin-bottom: 1.5rem; text-align: center; }
    .form-group { margin-bottom: 1.3rem; }
    .form-group label { display: block; margin-bottom: 0.4rem; color: #4e2e0e; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.7rem; border-radius: 8px; border: 1px solid #e0c9b2; background: #fff; color: #4e2e0e; font-size: 1rem; }
    .form-group textarea { min-height: 60px; }
    .form-actions { text-align: center; }
    .welcome-btn { background: #a0522d; color: #fff8e7; border: none; border-radius: 8px; padding: 0.8rem 2.2rem; font-size: 1.1rem; cursor: pointer; transition: background 0.2s; }
    .welcome-btn:hover { background: #7c3f17; }
    .success-msg { color: #228B22; text-align: center; margin-bottom: 1rem; display: none; }
    .back-btn { display: inline-block; margin-bottom: 1.2rem; color: #a0522d; background: #ffe4b5; border-radius: 8px; padding: 0.5rem 1.2rem; text-decoration: none; font-weight: 500; transition: background 0.2s; }
    .back-btn:hover { background: #e0c9b2; }
    .quick-links { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; }
    .quick-links a { color: #fff8e7; background: #a0522d; border-radius: 8px; padding: 0.5rem 1.2rem; text-decoration: none; font-weight: 500; transition: background 0.2s; }
    .quick-links a:hover { background: #7c3f17; }
    a{
      text-decoration: none;
      color: #fff;
    }
    @media (max-width: 600px) { .book-container { padding: 1.2rem 0.5rem; } .quick-links { flex-direction: column; gap: 0.5rem; } }
  </style>
  <link rel="stylesheet" href="../assets/css/global-responsive.css">
  <link rel="stylesheet" href="../assets/css/ui-system.css">
</head>
<body>
  <div class="book-container">
    <a href="javascript:history.back()" class="back-btn">&larr; Back</a>
    <div class="book-title">Book Your Stay, Car, or Experience</div>
    <div class="success-msg" id="successMsg">Booking submitted! The admin will be notified.</div>
    <form id="bookForm" autocomplete="off">
      <div class="form-group">
        <label for="itemType">Type</label>
        <input type="text" id="itemType" readonly required>
      </div>
      <div class="form-group">
        <label for="itemName">Name of Item</label>
        <input type="text" id="itemName" readonly required>
      </div>
      <div class="form-group">
        <label for="userName">Your Name</label>
        <input type="text" id="userName" required>
      </div>
      <div class="form-group">
        <label for="userEmail">Your Email</label>
        <input type="email" id="userEmail" required>
      </div>
      <div class="form-group">
        <label for="startDate">Start Date</label>
        <input type="date" id="startDate" required>
      </div>
      <div class="form-group">
        <label for="days">Number of Days</label>
        <input type="number" id="days" min="1" required>
      </div>
      <div class="form-group">
        <label for="details">Additional Details</label>
        <textarea id="details" placeholder="Any special requests or info..."></textarea>
      </div>
      <div class="form-actions">
        <button class="welcome-btn" type="submit">Book Now</button>
      </div>
    </form>
  </div>
  <script>
    // Get item info from URL parameters
    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }
    const itemType = getQueryParam('type') || '';
    const itemName = getQueryParam('name') || '';
    document.getElementById('itemType').value = itemType;
    document.getElementById('itemName').value = itemName;
    document.getElementById('bookForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Collect form data
      const type = document.getElementById('itemType').value;
      const name = document.getElementById('itemName').value;
      const user = document.getElementById('userName').value;
      const email = document.getElementById('userEmail').value;
      const date = document.getElementById('startDate').value;
      const details = document.getElementById('details').value;
      const days = document.getElementById('days').value;
      // Build URL with parameters
      const url = `booking-confirmation.html?type=${encodeURIComponent(type)}&name=${encodeURIComponent(name)}&user=${encodeURIComponent(user)}&email=${encodeURIComponent(email)}&date=${encodeURIComponent(date)}&details=${encodeURIComponent(details)}&days=${encodeURIComponent(days)}`;
      window.location.href = url;
    });
  </script>
  <script src="../assets/js/navbar.js"></script>
</body>
</html>
