<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Booking - Blueprint Rwanda</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .booking-main {
            padding-top: 120px;
            padding-bottom: var(--space-lg);
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2.5rem;
        }

        .booking-header {
            grid-column: span 2;
            margin-bottom: var(--space-md);
        }

        .booking-form-section {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .form-section-title {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            color: var(--primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group.full {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--white);
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-group input.error, .form-group textarea.error {
            border-color: #e53e3e;
            box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.1);
        }

        .summary-card {
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .summary-header {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .summary-header img {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-md);
            object-fit: cover;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-weight: 700;
            font-size: 1.25rem;
        }

        @media (max-width: 900px) {
            .booking-main {
                grid-template-columns: 1fr;
            }
            .booking-header {
                grid-column: span 1;
            }
            .summary-card {
                position: static;
                order: -1;
            }
        }
    </style>
</head>
<body>
    <main class="booking-main container">
        <header class="booking-header" data-animate>
            <h1 id="pageTitle">Complete Your Booking</h1>
            <p id="pageSubtitle">Confirm your details and finalize the reservation.</p>
        </header>

        <section class="booking-form-section">
            <div class="card" data-animate style="transition-delay: 0.1s;">
                <h3 class="form-section-title">Your Information</h3>
                <form id="bookForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" placeholder="john@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" value="+250 " placeholder="+250 788 000 000" required>
                        </div>
                        <div class="form-group">
                            <label for="startDate">Check-in / Start Date</label>
                            <input type="date" id="startDate" required>
                        </div>
                        <div class="form-group">
                            <label for="duration" id="durationLabel">Number of Days</label>
                            <input type="number" id="duration" value="1" min="1">
                        </div>
                        <div class="form-group full">
                            <label for="requests">Special Requests</label>
                            <textarea id="requests" rows="3" placeholder="Anything else we should know?"></textarea>
                        </div>
                    </div>
                </form>
            </div>

            <div data-animate style="transition-delay: 0.2s; margin-top: 1rem;">
                <button type="submit" form="bookForm" class="btn btn-primary w-100" style="padding: 1.25rem;">
                    <i class="fas fa-arrow-right"></i> Continue to Secure Payment
                </button>
                <p style="text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-top: 1rem;">
                    You will choose a payment method on the next step.
                </p>
            </div>
        </section>

        <aside class="summary-card" data-animate style="transition-delay: 0.1s;">
            <div class="card">
                <h3 class="form-section-title">Booking Summary</h3>
                <div class="summary-header">
                    <img id="itemImg" src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&q=80&w=200" alt="">
                    <div>
                        <h4 id="itemNameDisplay">Kigali View Apartment</h4>
                        <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem;">
                            <i class="fas fa-star" style="color: #f6ad55;"></i> 4.9 (120 reviews)
                        </div>
                    </div>
                </div>

                <div class="price-calculations">
                    <div class="price-row">
                        <span id="priceLabel">$50 x 3 nights</span>
                        <span id="basePrice">$150.00</span>
                    </div>
                    <div class="price-row">
                        <span>Cleaning fee</span>
                        <span>$10.00</span>
                    </div>
                    <div class="price-row" style="color: #48bb78; font-weight: 600;">
                        <span>Seasonal discount (5%)</span>
                        <span>-$8.00</span>
                    </div>
                    <div class="total-row">
                        <span>Total (USD)</span>
                        <span id="totalPrice">$152.00</span>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const type = getQueryParam('type') || 'Accommodation';
        const name = getQueryParam('name') || 'Beautiful Kigali Stay';

        document.getElementById('itemNameDisplay').textContent = name;
        document.getElementById('pageTitle').textContent = `Book ${name}`;
        
        // Adjust labels based on type
        if (type.toLowerCase() === 'car') {
            document.getElementById('durationLabel').textContent = 'Rental Duration (Days)';
        } else if (type.toLowerCase() === 'place') {
            document.getElementById('durationLabel').textContent = 'Number of People';
        }

        document.getElementById('bookForm').setAttribute('novalidate', 'true');

        function showError(inputId, message, name) {
            const el = document.getElementById(inputId);
            if (el) {
                el.classList.add('error');
                el.focus();
                el.addEventListener('input', function removeErr() {
                    el.classList.remove('error');
                    el.removeEventListener('input', removeErr);
                });
            }
            const firstName = name ? name.split(' ')[0] : 'there';
            Components.showToast(`Hey ${firstName}, ${message}`, 'error');
        }

        document.getElementById('bookForm').onsubmit = function(e) {
            e.preventDefault();
            
            // Clear previous errors
            document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));

            const fullName = document.getElementById('fullName').value.trim();
            const email    = document.getElementById('email').value.trim();
            const phone    = document.getElementById('phone').value.trim();
            const date     = document.getElementById('startDate').value;
            const days     = document.getElementById('duration').value;

            if (!fullName) { showError('fullName', 'we need your full name.', ''); return; }
            if (!email) { showError('email', 'please enter your email address.', fullName); return; }
            if (!phone) { showError('phone', 'please enter your phone number.', fullName); return; }
            if (!date) { showError('startDate', 'please select a check-in date.', fullName); return; }
            if (!days || days < 1) { showError('duration', 'please enter a valid duration.', fullName); return; }

            // Rate from item page (default $80 if not passed)
            const rate = getQueryParam('rate') || '80';
            const img  = getQueryParam('img')  || '';

            const url = `payment.html?type=${encodeURIComponent(type)}`
                      + `&name=${encodeURIComponent(name)}`
                      + `&user=${encodeURIComponent(fullName)}`
                      + `&email=${encodeURIComponent(email)}`
                      + `&date=${encodeURIComponent(date)}`
                      + `&days=${encodeURIComponent(days)}`
                      + `&rate=${encodeURIComponent(rate)}`
                      + `&img=${encodeURIComponent(img)}`;
            window.location.href = url;
        };
    </script>
</body>
</html>
