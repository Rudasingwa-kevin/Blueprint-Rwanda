<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Blueprint Rwanda</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        body {
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 1rem;
            z-index: 10;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header img {
            width: 80px;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--white);
        }

        .password-checklist {
            background: var(--surface);
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
            color: var(--text-muted);
        }

        .checklist-item.valid {
            color: #48bb78;
        }

        .checklist-item i {
            font-size: 0.75rem;
        }

        .back-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
        }

        .back-link a {
            color: var(--primary);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" data-animate>
            <div class="auth-header">
                <img src="../assets/images/branding/title-logo.png" alt="Blueprint Rwanda">
                <h2>Set New Password</h2>
                <p style="color: var(--text-muted);">Enter your new password below.</p>
            </div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <div class="password-checklist">
                    <div class="checklist-item" id="len-check"><i class="fas fa-circle"></i> At least 8 characters</div>
                    <div class="checklist-item" id="num-check"><i class="fas fa-circle"></i> At least one number</div>
                    <div class="checklist-item" id="spec-check"><i class="fas fa-circle"></i> At least one special character</div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-100" style="padding: 1rem;">Update Password</button>
            </form>

            <div class="back-link">
                <p><a href="verification.html">Back to Login</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        const passwordInput = document.getElementById('password');
        const lenCheck = document.getElementById('len-check');
        const numCheck = document.getElementById('num-check');
        const specCheck = document.getElementById('spec-check');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            
            // Length check
            if (val.length >= 8) lenCheck.classList.add('valid');
            else lenCheck.classList.remove('valid');

            // Number check
            if (/\d/.test(val)) numCheck.classList.add('valid');
            else numCheck.classList.remove('valid');

            // Special char check
            if (/[!@#$%^&*]/.test(val)) specCheck.classList.add('valid');
            else specCheck.classList.remove('valid');
        });

        document.getElementById('resetPasswordForm').onsubmit = function(e) {
            e.preventDefault();
            const pw = document.getElementById('password').value;
            const confirmPw = document.getElementById('confirmPassword').value;

            if (pw !== confirmPw) {
                alert('Passwords do not match!');
                return;
            }

            if (pw.length < 8 || !/\d/.test(pw) || !/[!@#$%^&*]/.test(pw)) {
                alert('Please meet all password requirements.');
                return;
            }

            alert('Your password has been successfully updated.');
            window.location.href = 'verification.html';
        };
    </script>
</body>
</html>
