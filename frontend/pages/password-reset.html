<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Establish Security - Blueprint Rwanda</title>
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .auth-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }

        .auth-visual {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 4rem;
            color: var(--white);
        }

        .auth-form-side {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            background: var(--bg);
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
        }

        .auth-header {
            margin-bottom: 3rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.75rem;
            color: var(--primary);
        }

        .form-control {
            width: 100%;
            padding: 1.1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--white);
            color: var(--text);
            font-weight: 500;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(160, 82, 45, 0.08);
        }

        .security-checklist {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: var(--radius-md);
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            transition: var(--transition);
        }

        .checklist-item i {
            font-size: 0.75rem;
            color: var(--border);
        }

        .checklist-item.valid {
            color: var(--success);
        }

        .checklist-item.valid i {
            color: var(--success);
        }

        @media (max-width: 992px) {
            .auth-split { grid-template-columns: 1fr; }
            .auth-visual { display: none; }
            .auth-form-side { padding: 2rem; }
        }
    </style>
</head>
<body data-no-navbar data-no-footer>
    <main class="auth-split">
        <div class="auth-visual" data-animate>
            <div>
                <h2 style="font-size: 3rem; margin-bottom: 1rem;">Security First.</h2>
                <p style="font-size: 1.25rem; opacity: 0.9; font-weight: 300;">Reinforcing the structural integrity of your digital identity.</p>
            </div>
        </div>
        
        <div class="auth-form-side">
            <div class="auth-card" data-animate style="transition-delay: 0.2s;">
                <div class="auth-header">
                    <img src="../assets/images/branding/title-logo.png" alt="Blueprint Rwanda" style="width: 60px; margin-bottom: 2rem;">
                    <h1 class="gradient-text" style="font-size: 2.5rem; margin-bottom: 0.75rem;">Set Security</h1>
                    <p style="color: var(--text-muted);">Establish your new high-entropy credentials below.</p>
                </div>

                <form id="resetPasswordForm">
                    <div class="form-group">
                        <label>New Blueprint Key</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="security-checklist">
                        <div class="checklist-item" id="len-check"><i class="fas fa-circle"></i> Minimum 8 Characters</div>
                        <div class="checklist-item" id="num-check"><i class="fas fa-circle"></i> Numerical Integration</div>
                        <div class="checklist-item" id="spec-check"><i class="fas fa-circle"></i> Specialist Character (e.g. @, #, $)</div>
                    </div>

                    <div class="form-group">
                        <label>Confirm Key</label>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100" style="padding: 1.1rem;">Authorize Update</button>
                    
                    <div style="text-align: center; margin-top: 2rem;">
                        <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 700; font-size: 0.9rem;">Back to Secure Login</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        const passwordInput = document.getElementById('password');
        const lenCheck = document.getElementById('len-check');
        const numCheck = document.getElementById('num-check');
        const specCheck = document.getElementById('spec-check');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            
            // Length check
            if (val.length >= 8) {
                lenCheck.classList.add('valid');
                lenCheck.querySelector('i').className = 'fas fa-check-circle';
            } else {
                lenCheck.classList.remove('valid');
                lenCheck.querySelector('i').className = 'fas fa-circle';
            }

            // Number check
            if (/\d/.test(val)) {
                numCheck.classList.add('valid');
                numCheck.querySelector('i').className = 'fas fa-check-circle';
            } else {
                numCheck.classList.remove('valid');
                numCheck.querySelector('i').className = 'fas fa-circle';
            }

            // Special char check
            if (/[!@#$%^&*]/.test(val)) {
                specCheck.classList.add('valid');
                specCheck.querySelector('i').className = 'fas fa-check-circle';
            } else {
                specCheck.classList.remove('valid');
                specCheck.querySelector('i').className = 'fas fa-circle';
            }
        });

        document.getElementById('resetPasswordForm').onsubmit = function(e) {
            e.preventDefault();
            const pw = document.getElementById('password').value;
            const confirmPw = document.getElementById('confirmPassword').value;

            if (pw !== confirmPw) {
                Components.showToast('Security Keys do not match', 'error');
                return;
            }

            if (pw.length < 8 || !/\d/.test(pw) || !/[!@#$%^&*]/.test(pw)) {
                Components.showToast('Security protocols not met', 'error');
                return;
            }

            Components.showToast('Security Credentials Updated', 'success');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        };
    </script>
</body>
</html>
