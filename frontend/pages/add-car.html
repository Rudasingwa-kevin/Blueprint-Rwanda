<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Instant theme sync to prevent flash -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
    <title>Fleet Integration - Blueprint Rwanda</title>
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body data-no-navbar>
    <!-- Context-Aware Back Navigation -->
    <div id="form-topbar" style="position: fixed; top: 0; left: 0; right: 0; z-index: 9999; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; background: var(--surface); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px);">
        <button onclick="history.back()" style="background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-weight: 700; color: var(--primary); font-size: 0.95rem;">
            <i class="fas fa-arrow-left"></i> Back
        </button>
        <span style="opacity: 0.3;">|</span>
        <span id="context-label" style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Fleet Integration</span>
    </div>
    <main class="admin-main container">
        <header class="admin-header" data-animate>
            <div class="admin-title">
                <h1 class="gradient-text">Fleet Integration</h1>
                <p>Establishing the operational parameters for a new vehicle asset.</p>
            </div>
            <div class="admin-actions">
                <button class="btn btn-secondary" onclick="history.back()">Discard Changes</button>
            </div>
        </header>

        <section class="admin-form-container">
            <div class="card glass" style="padding: 3rem;" data-animate style="transition-delay: 0.1s;">
                <form id="carForm" class="form-grid">
                    <!-- Vehicle Identity -->
                    <div class="form-group full">
                        <label>Asset Model / Branding</label>
                        <input type="text" class="form-control" placeholder="e.g. Toyota Land Cruiser V8 - 2024 Edition" required>
                    </div>

                    <div class="form-group">
                        <label>Fleet Category</label>
                        <select class="form-control">
                            <option>Premium 4x4 / Off-Road</option>
                            <option>Executive Sedan</option>
                            <option>Luxury Compact</option>
                            <option>Specialist Mobility</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Rental Yield (USD / Day)</label>
                        <input type="number" class="form-control" placeholder="150" required>
                    </div>

                    <!-- Technical Specs -->
                    <div class="form-group">
                        <label>Propulsion Type</label>
                        <select class="form-control">
                            <option>Diesel - High Efficiency</option>
                            <option>Petrol - High Performance</option>
                            <option>Electric - Zero Emission</option>
                            <option>Hybrid - Strategic</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Transmission Module</label>
                        <select class="form-control">
                            <option>Automatic - Adaptive</option>
                            <option>Manual - Precision</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Asset Capacity (Seats)</label>
                        <input type="number" class="form-control" value="5" min="1">
                    </div>

                    <div class="form-group">
                        <label>License Plate Hash</label>
                        <input type="text" class="form-control" placeholder="RAA 001 A">
                    </div>

                    <!-- Executive Summary -->
                    <div class="form-group full">
                        <label>Asset Summary</label>
                        <textarea class="form-control" placeholder="Define the vehicle's unique selling points, off-road capabilities, or executive features..."></textarea>
                    </div>

                    <!-- Visual Assets -->
                    <div class="form-group full">
                        <label>Asset Documentation (Visuals)</label>
                        <div class="upload-zone">
                            <i class="fas fa-car"></i>
                            <h4>Deploy Fleet Imagery</h4>
                            <p>Capture the essence of the vehicle from multiple angles. Max 10MB per unit.</p>
                        </div>
                    </div>

                    <div style="grid-column: span 2; display: flex; justify-content: flex-end; gap: 1.5rem; margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary" style="padding-left: 4rem; padding-right: 4rem;">Authorize Integration</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="../assets/js/components.js"></script>
    <script>
        const referrer = document.referrer;
        const isPartner = referrer.includes('partner-');
        const returnUrl = isPartner ? 'partner-dashboard.html' : 'admin-inventory.html';

        const label = document.getElementById('context-label');
        if (label) label.textContent = isPartner ? 'Partner Console → Fleet Integration' : 'Admin → Fleet Integration';

        document.getElementById('carForm').onsubmit = function(e) {
            e.preventDefault();
            Components.showToast('Vehicle Integration Synchronized', 'success');
            setTimeout(() => { location.href = returnUrl; }, 1500);
        };
    </script>
</body>
</html>
