<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landmark Curation - Blueprint Rwanda</title>
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
    <main class="admin-main container">
        <header class="admin-header" data-animate>
            <div class="admin-title">
                <h1 class="gradient-text">Landmark Curation</h1>
                <p>Cataloging Rwanda's heritage and natural wonders for global discovery.</p>
            </div>
            <div class="admin-actions">
                <button class="btn btn-secondary" onclick="history.back()">Discard Changes</button>
            </div>
        </header>

        <section class="admin-form-container">
            <div class="card glass" style="padding: 3rem;" data-animate style="transition-delay: 0.1s;">
                <form id="placeForm" class="form-grid">
                    <!-- Landmark Identity -->
                    <div class="form-group full">
                        <label>Landmark / Destination Name</label>
                        <input type="text" class="form-control" placeholder="e.g. Nyungwe Forest National Park" required>
                    </div>

                    <div class="form-group">
                        <label>Ecosystem Category</label>
                        <select class="form-control">
                            <option>Conservation & National Park</option>
                            <option>Heritage & Cultural Site</option>
                            <option>Aquatic / Lake Experience</option>
                            <option>Urban Landmark</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Administrative Sector</label>
                        <input type="text" class="form-control" placeholder="Southern Province" required>
                    </div>

                    <!-- Spatial Markers -->
                    <div class="form-group">
                        <label>Latitude Correlation</label>
                        <input type="text" class="form-control" placeholder="-2.4833">
                    </div>

                    <div class="form-group">
                        <label>Longitude Correlation</label>
                        <input type="text" class="form-control" placeholder="29.2333">
                    </div>

                    <!-- Narrative -->
                    <div class="form-group full">
                        <label>Curational Narrative</label>
                        <textarea class="form-control" placeholder="Synthesize the importance of this landmark, its unique biodiversity, and necessary protocols for access..."></textarea>
                    </div>

                    <div class="form-group full">
                        <label>Operational Highlights</label>
                        <input type="text" class="form-control" placeholder="e.g. Canopy Walk, Bird Watching, Tea Plantation Tours">
                    </div>

                    <!-- Visual Assets -->
                    <div class="form-group full">
                        <label>Asset Documentation (Visuals)</label>
                        <div class="upload-zone">
                            <i class="fas fa-map-marked-alt"></i>
                            <h4>Deploy Landmark Imagery</h4>
                            <p>Stunning 4K photography required for premium placement. Max 15MB total.</p>
                        </div>
                    </div>

                    <div style="grid-column: span 2; display: flex; justify-content: flex-end; gap: 1.5rem; margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary" style="padding-left: 4rem; padding-right: 4rem;">Authorize Curation</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        document.getElementById('placeForm').onsubmit = function(e) {
            e.preventDefault();
            Components.showToast('Landmark Curation Synchronized', 'success');
            setTimeout(() => {
                location.href = 'admin-places.html';
            }, 1500);
        };
    </script>
</body>
</html>
