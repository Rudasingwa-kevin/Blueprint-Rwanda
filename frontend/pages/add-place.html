<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Place - Admin</title>
    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/images/branding/title-logo.png" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/ui-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .form-main {
            padding-top: 100px;
            padding-bottom: var(--space-lg);
            max-width: 800px;
            margin: 0 auto;
        }

        .form-header {
            margin-bottom: var(--space-md);
        }

        .form-header h1 {
            font-size: 2rem;
            color: var(--primary);
        }

        .form-card {
            padding: var(--space-md);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group.full {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--white);
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .image-upload-box {
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 2rem;
            text-align: center;
            background: var(--bg);
            cursor: pointer;
            transition: var(--transition);
        }

        .image-upload-box:hover {
            border-color: var(--primary);
            background: var(--surface);
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <main class="form-main container">
        <header class="form-header" data-animate>
            <h1>Add New Place</h1>
            <p>Feature a new destination or landmark to inspire travelers.</p>
        </header>

        <section class="card form-card" data-animate style="transition-delay: 0.1s;">
            <form id="placeForm" class="form-grid">
                <!-- Place Info -->
                <div class="form-group full">
                    <label for="name">Place Name</label>
                    <input type="text" id="name" placeholder="e.g. Volcanoes National Park" required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category">
                        <option value="nature">Nature & Wildlife</option>
                        <option value="culture">Culture & History</option>
                        <option value="adventure">Adventure</option>
                        <option value="urban">Urban Exploration</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="location">Primary Location (District)</label>
                    <input type="text" id="location" placeholder="Musanze" required>
                </div>

                <div class="form-group full">
                    <label for="description">About this Place</label>
                    <textarea id="description" placeholder="Share the history, beauty, and why users should visit..."></textarea>
                </div>

                <div class="form-group full">
                    <label for="highlights">Key Highlights (comma separated)</label>
                    <input type="text" id="highlights" placeholder="Gorilla Trekking, Golden Monkeys, Hiking">
                </div>

                <!-- Media -->
                <div class="form-group full">
                    <label>Inspirational Photos</label>
                    <div class="image-upload-box">
                        <i class="fas fa-camera" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
                        <p style="font-weight: 600; margin-bottom: 0.25rem;">Click to upload destination photos</p>
                        <p style="font-size: 0.8rem; color: var(--text-muted);">High resolution photos work best</p>
                    </div>
                </div>

                <div class="form-actions full">
                    <button type="button" class="btn btn-secondary" onclick="history.back()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Publish Destination</button>
                </div>
            </form>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/components.js"></script>
    <script>
        document.getElementById('placeForm').onsubmit = function(e) {
            e.preventDefault();
            alert('Destination published successfully!');
            location.href = 'admin-places.html';
        };
    </script>
</body>
</html>
