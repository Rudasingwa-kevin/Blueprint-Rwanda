<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings - Blueprint Rwanda</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #fff8e7; font-family: 'Segoe UI', 'Roboto', Arial, sans-serif; }
    .bookings-container { max-width: 800px; margin: 3rem auto; background: #fff; border-radius: 18px; box-shadow: 0 8px 48px #a0522d22; padding: 2.5rem 2rem; }
    .bookings-title { font-size: 2rem; color: #a0522d; font-weight: 700; margin-bottom: 2rem; text-align: center; }
    .booking-card { background: #fff8e7; border-radius: 12px; box-shadow: 0 1.5px 8px #a0522d11; padding: 1.2rem 1.5rem; margin-bottom: 1.5rem; border-left: 4px solid #ffe4b5; }
    .booking-card h4 { color: #a0522d; font-size: 1.18rem; margin-bottom: 0.5rem; font-weight: 700; }
    .booking-meta { color: #4e2e0e; font-size: 1.08rem; margin-bottom: 0.5rem; }
    .booking-date { color: #b08a5a; font-size: 1.01rem; margin-bottom: 0.5rem; }
    .booking-status { color: #fff8e7; background: #a0522d; border-radius: 8px; padding: 0.18rem 0.7rem; font-size: 0.98rem; font-weight: 700; display: inline-block; }
  </style>
</head>
<body>
  <div class="bookings-container">
    <div class="bookings-title">My Bookings</div>
    <div class="booking-card">
      <h4>Kigali View Apartment</h4>
      <div class="booking-meta">Kigali, $40/night</div>
      <div class="booking-date">Check-in: July 10, 2025</div>
      <div class="booking-status">Confirmed</div>
    </div>
    <div class="booking-card">
      <h4>Toyota RAV4</h4>
      <div class="booking-meta">Automatic, 5 seats, $50/day</div>
      <div class="booking-date">Rental: June 15, 2025</div>
      <div class="booking-status" style="background:#ffb347;color:#a0522d;">Completed</div>
    </div>
  </div>
</body>
</html>
