<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmation - Blueprint Rwanda</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #fff8e7; font-family: 'Segoe UI', 'Roboto', Arial, sans-serif; }
    .confirmation-container { max-width: 500px; margin: 5rem auto; background: #fff; border-radius: 18px; box-shadow: 0 8px 48px #a0522d22; padding: 2.5rem 2rem; text-align: center; }
    .confirmation-icon { font-size: 3.5rem; color: #a0522d; margin-bottom: 1.2rem; }
    .confirmation-title { font-size: 2rem; color: #a0522d; font-weight: 700; margin-bottom: 0.7rem; }
    .confirmation-text { color: #4e2e0e; font-size: 1.15rem; margin-bottom: 2rem; }
    .confirmation-btn { background: linear-gradient(90deg, #a0522d 80%, #ffb347 100%); color: #fff8e7; border: none; border-radius: 10px; padding: 0.8rem 2.2rem; font-size: 1.1rem; cursor: pointer; font-weight: 700; box-shadow: 0 2px 12px #a0522d22; }
    .confirmation-btn:hover { background: linear-gradient(90deg, #7c3f17 80%, #ffb347 100%); }
  </style>
</head>
<body>
  <div class="confirmation-container">
    <div class="confirmation-icon">&#10004;</div>
    <div class="confirmation-title">Booking Confirmed!</div>
    <div class="confirmation-text">Thank you for your booking. A confirmation email has been sent to you.<br>We look forward to welcoming you!</div>
    <a href="index.html" class="confirmation-btn">Back to Home</a>
  </div>
</body>
</html>
