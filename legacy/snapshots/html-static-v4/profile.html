<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile - Blueprint Rwanda</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #fff8e7; font-family: 'Segoe UI', 'Roboto', Arial, sans-serif; }
    .profile-container { max-width: 700px; margin: 3rem auto; background: #fff; border-radius: 18px; box-shadow: 0 8px 48px #a0522d22; padding: 2.5rem 2rem; }
    .profile-header { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; }
    .profile-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid #ffe4b5; background: #eee; }
    .profile-info { flex: 1; }
    .profile-name { font-size: 1.7rem; color: #a0522d; font-weight: 700; margin-bottom: 0.3rem; }
    .profile-email { color: #4e2e0e; font-size: 1.1rem; margin-bottom: 0.7rem; }
    .profile-actions { margin-top: 1.2rem; }
    .profile-btn { background: linear-gradient(90deg, #a0522d 80%, #ffb347 100%); color: #fff8e7; border: none; border-radius: 10px; padding: 0.7rem 1.7rem; font-size: 1.05rem; cursor: pointer; font-weight: 700; box-shadow: 0 2px 12px #a0522d22; margin-right: 1rem; }
    .profile-btn:hover { background: linear-gradient(90deg, #7c3f17 80%, #ffb347 100%); }
    .profile-section { margin-bottom: 2rem; }
    .profile-section h3 { color: #a0522d; font-size: 1.18rem; margin-bottom: 0.7rem; font-weight: 700; }
    .profile-list { list-style: disc; margin-left: 1.5rem; color: #4e2e0e; font-size: 1.08rem; font-weight: 500; }
  </style>
</head>
<body>
  <div class="profile-container">
    <div class="profile-header">
      <img src="https://randomuser.me/api/portraits/men/41.jpg" alt="User Avatar" class="profile-avatar">
      <div class="profile-info">
        <div class="profile-name">Samuel N.</div>
        <div class="profile-email">samuel@example.com</div>
        <div class="profile-actions">
          <button class="profile-btn">Edit Profile</button>
          <button class="profile-btn">Logout</button>
        </div>
      </div>
    </div>
    <div class="profile-section">
      <h3>My Bookings</h3>
      <ul class="profile-list">
        <li>Kigali View Apartment - July 2025</li>
        <li>Toyota RAV4 - June 2025</li>
      </ul>
    </div>
    <div class="profile-section">
      <h3>My Reviews</h3>
      <ul class="profile-list">
        <li>"Amazing experience!" - Kigali View Apartment</li>
        <li>"Very comfortable." - Toyota RAV4</li>
      </ul>
    </div>
  </div>
</body>
</html>
