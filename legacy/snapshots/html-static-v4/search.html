<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Results - Blueprint Rwanda</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #fff8e7; font-family: 'Segoe UI', 'Roboto', Arial, sans-serif; }
    .search-container { max-width: 900px; margin: 3rem auto; background: #fff; border-radius: 18px; box-shadow: 0 8px 48px #a0522d22; padding: 2.5rem 2rem; }
    .search-title { font-size: 2rem; color: #a0522d; font-weight: 700; margin-bottom: 2rem; text-align: center; }
    .search-bar { width: 100%; padding: 0.7rem; border-radius: 8px; border: 1.5px solid #ffe4b5; font-size: 1.05rem; margin-bottom: 2rem; }
    .search-results { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; }
    .search-card { background: #fff8e7; border-radius: 12px; box-shadow: 0 1.5px 8px #a0522d11; padding: 1.2rem 1.5rem; border-left: 4px solid #ffe4b5; }
    .search-card h4 { color: #a0522d; font-size: 1.18rem; margin-bottom: 0.5rem; font-weight: 700; }
    .search-meta { color: #4e2e0e; font-size: 1.08rem; margin-bottom: 0.5rem; }
    .search-btn { background: linear-gradient(90deg, #a0522d 80%, #ffb347 100%); color: #fff8e7; border: none; border-radius: 10px; padding: 0.5rem 1.2rem; font-size: 1.05rem; cursor: pointer; font-weight: 700; box-shadow: 0 2px 12px #a0522d22; }
    .search-btn:hover { background: linear-gradient(90deg, #7c3f17 80%, #ffb347 100%); }
  </style>
</head>
<body>
  <div class="search-container">
    <div class="search-title">Search Results</div>
    <input type="text" class="search-bar" placeholder="Search accommodations, cars, places...">
    <div class="search-results">
      <div class="search-card">
        <h4>Kigali View Apartment</h4>
        <div class="search-meta">Kigali, $40/night, 4.8★</div>
        <a href="item-details.html?type=Accommodation&name=Kigali%20View%20Apartment" class="search-btn">View Details</a>
      </div>
      <div class="search-card">
        <h4>Toyota RAV4</h4>
        <div class="search-meta">Automatic, 5 seats, $50/day</div>
        <a href="item-details.html?type=Car&name=Toyota%20RAV4" class="search-btn">View Details</a>
      </div>
      <div class="search-card">
        <h4>Akagera Park Tour</h4>
        <div class="search-meta">Eastern Rwanda, $120/tour, 4.9★</div>
        <a href="item-details.html?type=Place&name=Akagera%20Park%20Tour" class="search-btn">View Details</a>
      </div>
    </div>
  </div>
</body>
</html>
