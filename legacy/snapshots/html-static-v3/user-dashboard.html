<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard - Blueprint Rwanda</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .dashboard-container { max-width: 1100px; margin: 2rem auto; padding: 2rem; background: #fff8e7; border-radius: 18px; box-shadow: 0 2px 16px #a0522d22; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .dashboard-title { font-size: 2rem; color: #a0522d; }
    .dashboard-summary { display: flex; gap: 2rem; margin-bottom: 2rem; }
    .summary-card { background: #ffe4b5; border-radius: 12px; padding: 1.2rem 2rem; min-width: 180px; text-align: center; box-shadow: 0 1px 6px #a0522d11; }
    .summary-title { color: #7c3f17; font-size: 1.1rem; margin-bottom: 0.5rem; }
    .summary-value { font-size: 1.7rem; font-weight: bold; color: #a0522d; }
    .dashboard-section { margin-bottom: 2.5rem; }
    .dashboard-section h2 { color: #a0522d; font-size: 1.3rem; margin-bottom: 1rem; }
    .item-table { width: 100%; border-collapse: collapse; background: #fff; }
    .item-table th, .item-table td { padding: 0.8rem 1rem; border-bottom: 1px solid #e0c9b2; text-align: left; }
    .item-table th { background: #ffe4b5; color: #7c3f17; }
    .item-table tr:last-child td { border-bottom: none; }
    .chart-container { max-width: 600px; margin: 2rem auto; background: #fff; border-radius: 12px; box-shadow: 0 1px 8px #a0522d11; padding: 1.5rem; }
    @media (max-width: 800px) { .dashboard-summary { flex-direction: column; gap: 1rem; } .dashboard-header { flex-direction: column; gap: 1rem; } }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <div class="dashboard-header">
      <div class="dashboard-title">Welcome, User!</div>
      <a href="user-add-item.html" class="welcome-btn">Add New Item</a>
    </div>
    <div class="dashboard-summary">
      <div class="summary-card">
        <div class="summary-title">Total Orders</div>
        <div class="summary-value" id="totalOrders">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-title">Total Earnings</div>
        <div class="summary-value" id="totalEarnings">$0</div>
      </div>
      <div class="summary-card">
        <div class="summary-title">Active Listings</div>
        <div class="summary-value" id="totalListings">0</div>
      </div>
    </div>
    <div class="dashboard-section">
      <h2>Your Items</h2>
      <table class="item-table" id="itemTable">
        <thead>
          <tr>
            <th>Type</th>
            <th>Name</th>
            <th>Orders</th>
            <th>Earnings</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
    <div class="dashboard-section">
      <h2>Orders & Earnings Overview</h2>
      <div class="chart-container">
        <canvas id="ordersChart"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="earningsChart"></canvas>
      </div>
    </div>
  </div>
  <script>
    // Mock data for demonstration
    const items = [
      { type: 'Accommodation', name: 'Kigali View Apartment', orders: 12, earnings: 480, status: 'Active' },
      { type: 'Car', name: 'Toyota RAV4', orders: 7, earnings: 350, status: 'Active' },
      { type: 'Place', name: 'Akagera Park Tour', orders: 5, earnings: 250, status: 'Inactive' },
    ];
    // Populate summary
    const totalOrders = items.reduce((sum, i) => sum + i.orders, 0);
    const totalEarnings = items.reduce((sum, i) => sum + i.earnings, 0);
    document.getElementById('totalOrders').textContent = totalOrders;
    document.getElementById('totalEarnings').textContent = '$' + totalEarnings;
    document.getElementById('totalListings').textContent = items.length;
    // Populate table
    const tbody = document.getElementById('itemTable').querySelector('tbody');
    items.forEach(item => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${item.type}</td><td>${item.name}</td><td>${item.orders}</td><td>$${item.earnings}</td><td>${item.status}</td>`;
      tbody.appendChild(tr);
    });
    // Chart.js - Orders per Item
    const ctxOrders = document.getElementById('ordersChart').getContext('2d');
    new Chart(ctxOrders, {
      type: 'bar',
      data: {
        labels: items.map(i => i.name),
        datasets: [{
          label: 'Orders',
          data: items.map(i => i.orders),
          backgroundColor: ['#a0522d', '#ffe4b5', '#7c3f17'],
        }]
      },
      options: { responsive: true, plugins: { legend: { display: false } } }
    });
    // Chart.js - Earnings per Item
    const ctxEarnings = document.getElementById('earningsChart').getContext('2d');
    new Chart(ctxEarnings, {
      type: 'pie',
      data: {
        labels: items.map(i => i.name),
        datasets: [{
          label: 'Earnings',
          data: items.map(i => i.earnings),
          backgroundColor: ['#a0522d', '#ffe4b5', '#7c3f17'],
        }]
      },
      options: { responsive: true }
    });
  </script>
</body>
</html>
