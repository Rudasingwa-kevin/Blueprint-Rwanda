<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found - Blueprint Rwanda</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #fff8e7; font-family: 'Segoe UI', 'Roboto', Arial, sans-serif; }
    .error-container { max-width: 500px; margin: 7rem auto; background: #fff; border-radius: 18px; box-shadow: 0 8px 48px #a0522d22; padding: 2.5rem 2rem; text-align: center; }
    .error-title { font-size: 2.5rem; color: #a0522d; font-weight: 700; margin-bottom: 1.2rem; }
    .error-text { color: #4e2e0e; font-size: 1.15rem; margin-bottom: 2rem; }
    .error-btn { background: linear-gradient(90deg, #a0522d 80%, #ffb347 100%); color: #fff8e7; border: none; border-radius: 10px; padding: 0.8rem 2.2rem; font-size: 1.1rem; cursor: pointer; font-weight: 700; box-shadow: 0 2px 12px #a0522d22; }
    .error-btn:hover { background: linear-gradient(90deg, #7c3f17 80%, #ffb347 100%); }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-title">404 - Page Not Found</div>
    <div class="error-text">Sorry, the page you are looking for does not exist.</div>
    <a href="index.html" class="error-btn">Back to Home</a>
  </div>
</body>
</html>
