<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="2; url=frontend/pages/index.html">
  <title>Blueprint Rwanda</title>
  <style>
    :root {
      --bg: #f6e9db;
      --surface: rgba(255, 248, 231, 0.86);
      --text: #4e2e0e;
      --primary: #a0522d;
      --ring: rgba(160, 82, 45, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, #ffe7cb 0%, transparent 35%),
        radial-gradient(circle at bottom left, #efd4ba 0%, transparent 42%),
        var(--bg);
    }

    .redirect-card {
      width: min(100%, 520px);
      background: var(--surface);
      border: 1px solid #e8d0b7;
      border-radius: 18px;
      box-shadow: 0 14px 42px rgba(78, 46, 14, 0.14);
      backdrop-filter: blur(5px);
      padding: clamp(1.2rem, 2.5vw, 2rem);
      text-align: center;
    }

    .brand {
      margin: 0 0 0.4rem;
      font-size: clamp(1.2rem, 3.2vw, 1.7rem);
      color: var(--primary);
      letter-spacing: 0.3px;
    }

    .copy {
      margin: 0 0 0.9rem;
      line-height: 1.55;
      color: #5f3713;
    }

    .loader {
      width: 44px;
      height: 44px;
      margin: 0 auto 0.9rem;
      border-radius: 50%;
      border: 4px solid var(--ring);
      border-top-color: var(--primary);
      animation: spin 0.9s linear infinite;
    }

    a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
      border-bottom: 1px dashed rgba(160, 82, 45, 0.6);
    }

    a:hover {
      color: #7c3f17;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <main class="redirect-card" role="status" aria-live="polite">
    <div class="loader" aria-hidden="true"></div>
    <h1 class="brand">Blueprint Rwanda</h1>
    <p class="copy">Preparing your experience. You will be redirected in a moment.</p>
    <p class="copy">If redirection does not start, <a href="frontend/pages/index.html">continue here</a>.</p>
  </main>
  <script>
    window.location.replace("frontend/pages/index.html");
  </script>
</body>
</html>
