    max-width: 90vw;
    z-index: 3;
    text-align: center;
  }

  .logo {

    margin-bottom: 0.5rem;
  }

  .glass-form h1 {
    color: #a0522d;
    margin-bottom: 0.5rem;
    font-size: 2.2rem;
    letter-spacing: 1px;
  }

  .subtitle {
    font-size: 1.1rem;
    margin-bottom: 1rem;
    color: #4e2e0e;
  }

  .services {
    list-style: none;
    padding: 0;
    margin: 0 0 1.5rem 0;
  }

  .services li {

    font-weight: 500;
  }

  .welcome-btn {

    border: none;
    border-radius: 20px;
    padding: 0.8rem 2.2rem;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(160, 82, 45, 0.15);
    transition: background 0.2s;
  }

  .welcome-btn:hover {
    background: #7c3f17;
  }

  @media (max-width: 600px) {
    .glass-form {
      padding: 1.2rem 0.5rem;
      min-width: 0;
    }
    .logo {
      width: 110px;
    }
    .glass-form h1 {
      font-size: 1.3rem;
    }
  }

  .navbar {
    position: sticky;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(160, 82, 45, 0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    z-index: 1000;
    height: 70px;
    box-shadow: 0 4px 20px rgba(160, 82, 45, 0.15);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    font-size: 1.4rem;
    font-weight: bold;
    color: #fff8e7;
    cursor: pointer;
    text-decoration: none;
  }

  .nav-logo img {
    width: 60px;
    height: 60px;
    object-fit: contain;
    transition: transform 0.3s ease;
  }

  .nav-logo:hover img {
    transform: scale(1.1);
  }

  .nav-menu {
    list-style: none;
    display: flex;
    gap: 2rem;
    margin: 0;
    padding: 0;
    align-items: center;
  }

  .nav-menu li a {
    color: #fff8e7;
    text-decoration: none;
    font-size: 1.1rem;
    font-weight: 500;
    transition: color 0.3s ease;
    position: relative;
    padding: 5px 0;
  }

  .nav-menu li a:hover {
    color: #ffe4b5;
  }

  .nav-menu li a::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 2px;
    bottom: 0;
    left: 0;
    background-color: #ffe4b5;
    transform: scaleX(0);
    transform-origin: bottom right;
    transition: transform 0.25s ease-out;
  }

  .nav-menu li a:hover::after {
    transform: scaleX(1);
    transform-origin: bottom left;
  }

  .nav-cta a {
    background-color: #fff8e7;
    color: #a0522d;
    padding: 0.5rem 1.5rem;
    border-radius: 20px;
    font-weight: bold;
    text-decoration: none;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  .nav-cta a:hover {
    background-color: #ffe4b5;
    color: #7c3f17;
  }

  .hamburger {
    display: none;
    cursor: pointer;
    background: transparent;
    border: none;
    padding: 0;
    z-index: 1001;
  }

  .bar {
    display: block;
    width: 25px;
    height: 3px;
    margin: 5px auto;
    background-color: #fff8e7;
    transition: all 0.3s ease-in-out;
  }

  @media (max-width: 850px) {
    .nav-menu {
      position: fixed;
      left: -100%;
      top: 0;
      flex-direction: column;
      background-color: rgba(160, 82, 45, 0.98);
      width: 100%;
      height: 100vh;
      text-align: center;
      transition: 0.3s;
      box-shadow: 0 10px 27px rgba(0, 0, 0, 0.05);
      justify-content: center;
      gap: 2rem;
    }

    .nav-menu.active {
      left: 0;
    }

    .nav-menu li {
      margin: 1rem 0;
    }

    .hamburger {
      display: block;
    }

    .hamburger.active .bar:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active .bar:nth-child(1) {
      transform: translateY(8px) rotate(45deg);
    }

    .hamburger.active .bar:nth-child(3) {
      transform: translateY(-8px) rotate(-45deg);
    }
  }

  .hero {
    position: relative;
    min-height: 80vh;
    height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 0;
    background-size: cover;
    background-position: center;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: rgba(160, 82, 45, 0.35);
    backdrop-filter: blur(2px);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    color: #fff8e7;
  }

  .hero-content h1 {
    font-size: 2.3rem;
    margin-bottom: 0.5rem;
    letter-spacing: 1px;
  }

  .hero-content p {
    font-size: 1.1rem;
    margin-bottom: 1.2rem;
  }

  .search-bar-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto;
    max-width: 420px;
    background: rgba(255,255,255,0.7);
    border-radius: 24px;
    box-shadow: 0 2px 8px rgba(160,82,45,0.10);
    padding: 0.3rem 0.5rem;
  }

  .search-bar {
    flex: 1;
    border: none;
    outline: none;
    padding: 0.7rem 1rem;
    border-radius: 20px 0 0 20px;
    font-size: 1rem;
    background: transparent;
  }

  .search-btn {
    border: none;
    background: none;
    color: #a0522d;
    font-size: 1.3rem;
    cursor: pointer;
    padding: 0 1rem;
  }

  main {
    flex: 1 0 auto;
    width: 100%;
    padding: 0 0 2rem 0;
  }

      padding: 0.18rem 0.7rem;
      box-shadow: 0 1px 4px #a0522d22;
      letter-spacing: 0.5px;
      z-index: 3;
      border: 1px solid #fff8e7;
      text-shadow: 0 1px 0 #a0522d44;
    }
    @media (max-width: 600px) {
      .leader-card { min-width: 110px; max-width: 120px; padding: 0.7rem 0.3rem 0.6rem 0.3rem; }
      .leader-img { width: 40px; height: 40px; }
      .leaders-slider-section { padding: 0.7rem 0.2rem 0.7rem 0.2rem; }
    }
  </style>
  <script>
    // Custom Back button logic
    document.getElementById('customBackBtn').onclick = function(e) {
      e.preventDefault();
      var intent = localStorage.getItem('verificationIntent');
      if (intent === 'accommodation') {
        window.location.href = 'accommodation.html';
      } else if (intent === 'car') {
        window.location.href = 'rentcar.html';
      } else if (intent === 'place') {
        window.location.href = 'visit.html';
      } else {
        window.location.href = 'index.html';
      }
    };
    // Read item details from localStorage
    const type = localStorage.getItem('itemType') || '';
    const name = localStorage.getItem('itemName') || '';
    const price = localStorage.getItem('itemPrice') || '';
    const description = localStorage.getItem('itemDescription') || '';
    const images = JSON.parse(localStorage.getItem('itemImages') || '[]');
    const specs = JSON.parse(localStorage.getItem('itemSpecs') || 'null');

    // Set basic info
    document.getElementById('itemTitle').textContent = name;
    document.getElementById('itemType').textContent = type;
    document.getElementById('itemMeta').textContent = price;
    document.getElementById('itemOwner').style.display = 'none';
    document.getElementById('itemLeader').style.display = 'none';
    document.getElementById('itemDescription').textContent = description;

    // Gallery
    const galleryMainImg = document.getElementById('galleryMainImg');
    const galleryThumbs = document.getElementById('galleryThumbs');
    const galleryPrev = document.getElementById('galleryPrev');
    const galleryNext = document.getElementById('galleryNext');
    let currentImg = 0;
    function showGalleryImg(idx) {
      galleryMainImg.src = '';
      galleryMainImg.alt = `Image ${idx+1} of ${images.length} for ${name}`;
      galleryMainImg.setAttribute('aria-label', galleryMainImg.alt);
      galleryMainImg.style.opacity = 0.3;
      setTimeout(() => {
        galleryMainImg.src = images[idx];
        galleryMainImg.style.opacity = 1;
      }, 180);
      Array.from(galleryThumbs.children).forEach((el, i) => {
        el.classList.toggle('selected', i === idx);
      });
    }
    function updateGalleryArrows() {
      galleryPrev.disabled = (currentImg === 0);
      galleryNext.disabled = (currentImg === images.length-1);
    }
    galleryThumbs.innerHTML = '';
    images.forEach((img, idx) => {
      const thumb = document.createElement('img');
      thumb.src = img;
      thumb.alt = `Thumbnail ${idx+1} for ${name}`;
      thumb.className = 'gallery-thumb' + (idx === 0 ? ' selected' : '');
      thumb.tabIndex = 0;
      thumb.setAttribute('aria-label', thumb.alt);
      thumb.onclick = () => { currentImg = idx; showGalleryImg(idx); updateGalleryArrows(); };
      thumb.onkeydown = e => { if(e.key==='Enter'||e.key===' '){ currentImg = idx; showGalleryImg(idx); updateGalleryArrows(); } };
      galleryThumbs.appendChild(thumb);
    });
    showGalleryImg(0);
    updateGalleryArrows();
    galleryPrev.onclick = () => { if(currentImg>0){ currentImg--; showGalleryImg(currentImg); updateGalleryArrows(); } };
    galleryNext.onclick = () => { if(currentImg<images.length-1){ currentImg++; showGalleryImg(currentImg); updateGalleryArrows(); } };
    document.getElementById('galleryMain').onkeydown = e => {
      if(e.key==='ArrowLeft') galleryPrev.click();
      if(e.key==='ArrowRight') galleryNext.click();
    };

    // Hide unused sections
    document.getElementById('leadersSlider').style.display = 'none';
    document.getElementById('mapSection').style.display = 'none';
    document.getElementById('directionsLink').style.display = 'none';

    // Extras: show car specs if type is car
    const extrasSection = document.getElementById('itemExtrasSection');
    extrasSection.innerHTML = '';
    if(type === 'car' && specs && typeof specs === 'object') {
      extrasSection.innerHTML += '<h3>Car Specifications</h3><ul class="details-list">' + Object.entries(specs).map(([k,v]) => `<li><strong>${k}:</strong> ${v}</li>`).join('') + '</ul>';
    }

    // Book button
    document.getElementById('bookBtn').onclick = function() {
      window.location.href = `book-item.html`;
    };

    // Terms & Privacy Policy Modal (unchanged)
    const modalOverlay = document.getElementById('modalOverlay');
    const modalContent = document.getElementById('modalContent');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const closeModal = document.getElementById('closeModal');
    document.getElementById('termsLink').onclick = function(e) {
      e.preventDefault();
      modalTitle.textContent = 'Terms of Service';
      modalBody.innerHTML = '<strong>Terms of Service</strong><br><br>By using Blueprint Rwanda, you agree to abide by our booking policies, respect property rules, and provide accurate information. Cancellations and refunds are subject to our terms. Misuse of the platform may result in account suspension.';
      modalOverlay.style.display = 'flex';
    };
    document.getElementById('privacyLink').onclick = function(e) {
      e.preventDefault();
      modalTitle.textContent = 'Privacy Policy';
      modalBody.innerHTML = '<strong>Privacy Policy</strong><br><br>Your personal information is protected and used only for booking and communication purposes. We do not share your data with third parties except as required by law. For more details, contact support.';
      modalOverlay.style.display = 'flex';
    };
    closeModal.onclick = function() {
      modalOverlay.style.display = 'none';
    };
    modalOverlay.onclick = function(e) {
      if(e.target === modalOverlay) modalOverlay.style.display = 'none';
    };
  </script>
</body>
</html>
